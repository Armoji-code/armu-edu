
<style>
#mainContent { padding-bottom: 70px; }
.save-bar {
  position: fixed !important;
  bottom: 0;
  right: 0;
  left: var(--sidebar-w);
  z-index: 30;
  margin: 0 !important;
  border-radius: 0 !important;
}
</style>
<div class="topbar">
<svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-settings"></use></svg>
<span class="topbar-title">Settings</span>
<div class="topbar-right">
<div class="icon-btn" id="themeBtn" onclick="toggleTheme()"><svg class="icon icon-18"><use href="#ic-moon"></use></svg></div>
</div>
</div>
<div class="content" id="mainContent">
<div style="padding:48px;text-align:center;color:var(--text3);font-size:13px;">Loading…</div>
</div>

<script>


const TABS = [
  { key: 'calendar',    label: 'Calendar',    desc: 'Class schedule & events' },
  { key: 'homework',    label: 'Homework',    desc: 'Assignment tracking' },
  { key: 'tests',       label: 'Tests',       desc: 'Upcoming tests' },
  { key: 'schedule',    label: 'Schedule',    desc: 'Daily timetable' },
  { key: 'activities',  label: 'Activities',  desc: 'Extracurriculars' },
  { key: 'grades',      label: 'Grades',      desc: 'Grade history' },
  { key: 'conduct',     label: 'Conduct',     desc: 'Behaviour log' },
  { key: 'leaderboard', label: 'Leaderboard', desc: 'Student ranking' },
  { key: 'tutor',       label: 'AI Tutor',    desc: 'Chat with AI' },
  { key: 'whiteboard',  label: 'Whiteboard',  desc: 'Collaborative drawing' },
  { key: 'library',     label: 'Library',     desc: 'Learning resources' },
  { key: 'groups',      label: 'Groups',      desc: 'Study groups' },
  { key: 'meeting',    label: 'Meeting',     desc: 'Video calls' },
  { key: 'messages',    label: 'Messages',    desc: 'Peer messaging' },
];

const FEATURES = [
  { key: 'ai_enabled',                 label: 'AI Features',         desc: 'Master switch for all AI' },
  { key: 'tutor_enabled',              label: 'AI Tutor',            desc: 'Per-student chat tutor' },
  { key: 'digest_enabled',             label: 'Teacher Digest',      desc: 'Daily AI briefing for teachers' },
  { key: 'nudges_enabled',             label: 'Teacher Nudges',      desc: 'Action chips on teacher dashboard' },
  { key: 'deadline_reminders_enabled', label: 'Deadline Reminders',  desc: 'Scheduled push notifications' },
  { key: 'weekly_digest_enabled',      label: 'Weekly Student Report', desc: 'Weekly email/notification summary' },
  { key: 'message_scan_enabled',       label: 'Message Scanning',    desc: 'Silently scan messages with AI and flag harmful content for admin review' },
];

const MODEL_PH = {
  ollama:    { tutor: 'e.g. gemma3:12b', tracker: 'e.g. llama3.2:3b', advanced: 'e.g. gemma3:12b' },
  openai:    { tutor: 'e.g. gpt-4o-mini', tracker: 'e.g. gpt-4o-mini', advanced: 'e.g. gpt-4o' },
  anthropic: { tutor: 'e.g. claude-haiku-4-5-20251001', tracker: 'e.g. claude-haiku-4-5-20251001', advanced: 'e.g. claude-sonnet-4-6' },
};

let settings = null;

function toggle(key) {
  settings[key] = !settings[key];
  renderToggleCard(key);
  renderFeatCard(key);
}

function toggleTab(key) {
  const hidden = settings.hidden_tabs || [];
  const idx = hidden.indexOf(key);
  if (idx === -1) hidden.push(key); else hidden.splice(idx, 1);
  settings.hidden_tabs = hidden;
  renderTabCard(key);
}

function renderTabCard(key) {
  const el = document.querySelector(`.tab-card[data-key="${key}"]`);
  if (!el) return;
  const enabled = !(settings.hidden_tabs || []).includes(key);
  el.classList.toggle('enabled', enabled);
  const inp = el.querySelector('input');
  if (inp) inp.checked = enabled;
  updateThumb(el.querySelector('.toggle-thumb'), inp);
}

function renderFeatCard(key) {
  const el = document.querySelector(`.feat-card[data-key="${key}"]`);
  if (!el) return;
  const enabled = !!settings[key];
  el.classList.toggle('enabled', enabled);
  const inp = el.querySelector('input');
  if (inp) inp.checked = enabled;
  updateThumb(el.querySelector('.toggle-thumb'), inp);
}

function updateThumb(thumb, inp) {
  if (!thumb || !inp) return;
  thumb.style.transform = inp.checked ? 'translateX(16px)' : '';
}

function colorSwatch(id, defVal, label) {
  var swStyle = 'display:inline-block;vertical-align:top;width:60px;margin:0 10px 4px 0;text-align:center;';
  var boxStyle = 'display:block;width:44px;height:44px;border-radius:6px;border:2px solid var(--border);margin:0 auto;cursor:pointer;';
  var nameStyle = 'display:block;font-size:10px;color:var(--text3);font-weight:600;margin-top:6px;';
  var inputStyle = 'position:fixed;width:0;height:0;opacity:0;border:none;padding:0;';
  return '<span style="'+swStyle+'">'
    + '<span id="box_'+id+'" style="'+boxStyle+'background:'+defVal+';" onclick="document.getElementById(\''+id+'\').click()"></span>'
    + '<input type="color" id="'+id+'" value="'+defVal+'" style="'+inputStyle+'" oninput="syncColorBox(this)">'
    + '<span style="'+nameStyle+'">'+label+'</span>'
    + '</span>';
}

function renderAll(s) {
  settings = s;
  const c = document.getElementById('mainContent');
  c.innerHTML = `
    <!-- School Name -->
    <div class="section" id="section-school">
      <div class="section-head">
        <div class="section-icon" style="background:linear-gradient(135deg,rgba(var(--g1-rgb),0.15),rgba(var(--g2-rgb),0.15))">
          <svg class="icon icon-18" style="color:var(--g1)"><use href="#ic-school"/></svg>
        </div>
        <div><div class="section-title">School</div><div class="section-desc">Basic school information</div></div>
      </div>
      <div class="field-row">
        <div class="field-label">School Name</div>
        <input class="field-input" id="schoolName" type="text" value="${escAttr(s.school_name || '')}" placeholder="Your school name">
      </div>
    </div>

    <!-- Page Visibility -->
    <div class="section" id="section-tabs">
      <div class="section-head">
        <div class="section-icon" style="background:linear-gradient(135deg,rgba(var(--g2-rgb),0.15),rgba(110,231,183,0.15))">
          <svg class="icon icon-18" style="color:var(--g2)"><use href="#ic-eye"/></svg>
        </div>
        <div><div class="section-title">Page Visibility</div><div class="section-desc">Hide nav tabs school-wide — students on hidden pages are redirected to Dashboard</div></div>
      </div>
      <div class="tab-grid" id="tabGrid"></div>
    </div>

    <!-- AI Features (toggles) -->
    <div class="section" id="section-ai">
      <div class="section-head">
        <div class="section-icon" style="background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(var(--g1-rgb),0.15))">
          <svg class="icon icon-18" style="color:#a855f7"><use href="#ic-cpu"/></svg>
        </div>
        <div><div class="section-title">AI Features</div><div class="section-desc">Enable or disable individual AI features school-wide</div></div>
      </div>
      <div class="feat-grid" id="featGrid"></div>
    </div>

    <!-- AI Configuration -->
    <div class="section" id="section-ai-config">
      <div class="section-head">
        <div class="section-icon" style="background:linear-gradient(135deg,rgba(var(--g2-rgb),0.15),rgba(168,85,247,0.15))">
          <svg class="icon icon-18" style="color:var(--g2)"><use href="#ic-cpu"/></svg>
        </div>
        <div><div class="section-title">AI Configuration</div><div class="section-desc">Choose provider, set API keys, models, and generation parameters</div></div>
      </div>

      <!-- Provider -->
      <div class="sub-label">Provider</div>
      <div class="provider-pills">
        <button class="provider-pill${s.ai_provider==='ollama'?' active':''}" onclick="setProvider('ollama')">🖥 Ollama (Local)</button>
        <button class="provider-pill${s.ai_provider==='openai'?' active':''}" onclick="setProvider('openai')">✦ OpenAI / Compatible</button>
        <button class="provider-pill${s.ai_provider==='anthropic'?' active':''}" onclick="setProvider('anthropic')">◆ Anthropic</button>
      </div>

      <!-- Ollama config -->
      <div id="cfg-ollama" style="display:${s.ai_provider!=='openai'&&s.ai_provider!=='anthropic'?'block':'none'}">
        <div class="field-row">
          <div class="field-label">Ollama Server URL</div>
          <input class="field-input" id="ollama_base_url" type="text" value="${escAttr(s.ollama_base_url||'http://localhost:11434')}" placeholder="http://localhost:11434">
        </div>
        <div class="sub-label">Install Model</div>
        <div class="pull-row">
          <input class="pull-input" id="pullModelInput" type="text" placeholder="e.g. llama3.2:3b, gemma3:12b">
          <button class="pull-btn" id="pullBtn" onclick="pullModel()">Install</button>
        </div>
        <div class="pull-status" id="pullStatus"></div>
      </div>

      <!-- OpenAI config -->
      <div id="cfg-openai" style="display:${s.ai_provider==='openai'?'block':'none'}">
        <div class="privacy-warn">⚠ Student chat messages will be sent to OpenAI's servers to generate responses. Review OpenAI's <a href="https://openai.com/enterprise-privacy" target="_blank" style="color:inherit">data privacy policy</a> before enabling this in a school environment.</div>
        <div class="field-row">
          <div class="field-label">API Key</div>
          <input class="field-input" id="ai_api_key_openai" type="password" placeholder="${s.ai_api_key_set?'Key saved — enter new to replace':'sk-...'}">
        </div>
        <div class="field-row">
          <div class="field-label">Base URL <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional — for OpenAI-compatible APIs)</span></div>
          <input class="field-input" id="ai_api_base_url" type="text" value="${escAttr(s.ai_api_base_url||'')}" placeholder="https://api.openai.com/v1">
        </div>
      </div>

      <!-- Anthropic config -->
      <div id="cfg-anthropic" style="display:${s.ai_provider==='anthropic'?'block':'none'}">
        <div class="privacy-warn">⚠ Student chat messages will be sent to Anthropic's servers to generate responses. Review Anthropic's <a href="https://www.anthropic.com/privacy" target="_blank" style="color:inherit">data privacy policy</a> before enabling this in a school environment.</div>
        <div class="field-row">
          <div class="field-label">API Key</div>
          <input class="field-input" id="ai_api_key_anthropic" type="password" placeholder="${s.ai_api_key_set?'Key saved — enter new to replace':'sk-ant-...'}">
        </div>
      </div>

      <!-- Models -->
      <div class="sub-label">Models</div>
      <div class="ai-params-grid">
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">Tutor Model</div>
          <input class="field-input" id="tutor_model" type="text" value="${escAttr(s.tutor_model||'')}" placeholder="${(MODEL_PH[s.ai_provider]||MODEL_PH.ollama).tutor}">
        </div>
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">Advanced Model</div>
          <input class="field-input" id="advanced_model" type="text" value="${escAttr(s.advanced_model||'')}" placeholder="${(MODEL_PH[s.ai_provider]||MODEL_PH.ollama).advanced}">
        </div>
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">Tracker Model <span style="font-weight:400;text-transform:none;letter-spacing:0">(digests, nudges)</span></div>
          <input class="field-input" id="tracker_model" type="text" value="${escAttr(s.tracker_model||'')}" placeholder="${(MODEL_PH[s.ai_provider]||MODEL_PH.ollama).tracker}">
        </div>
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">Max Tokens</div>
          <input class="field-input" id="max_tokens" type="number" min="64" max="32768" value="${s.max_tokens||2048}">
        </div>
      </div>

      <!-- Generation params -->
      <div class="sub-label">Generation Parameters</div>
      <div class="ai-params-grid">
        <div>
          <div class="field-label" style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;">Tutor Temperature</div>
          <div class="slider-row">
            <input type="range" id="tutor_temperature" min="0" max="2" step="0.05" value="${s.tutor_temperature??0.7}"
              oninput="document.getElementById('tutor_temp_val').textContent=parseFloat(this.value).toFixed(2)">
            <span class="slider-val" id="tutor_temp_val">${(s.tutor_temperature??0.7).toFixed(2)}</span>
          </div>
          <div style="font-size:11px;color:var(--text3)">0 = deterministic · 1 = creative · 2 = wild</div>
        </div>
        <div>
          <div class="field-label" style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;">Tracker Temperature</div>
          <div class="slider-row">
            <input type="range" id="tracker_temperature" min="0" max="2" step="0.05" value="${s.tracker_temperature??0.3}"
              oninput="document.getElementById('tracker_temp_val').textContent=parseFloat(this.value).toFixed(2)">
            <span class="slider-val" id="tracker_temp_val">${(s.tracker_temperature??0.3).toFixed(2)}</span>
          </div>
          <div style="font-size:11px;color:var(--text3)">Lower = more consistent structured output</div>
        </div>
        <div>
          <div class="field-label" style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;">Top-P (Tutor)</div>
          <div class="slider-row">
            <input type="range" id="tutor_top_p" min="0" max="1" step="0.05" value="${s.tutor_top_p??1.0}"
              oninput="document.getElementById('top_p_val').textContent=parseFloat(this.value).toFixed(2)">
            <span class="slider-val" id="top_p_val">${(s.tutor_top_p??1.0).toFixed(2)}</span>
          </div>
          <div style="font-size:11px;color:var(--text3)">Nucleus sampling — 1.0 = off</div>
        </div>
      </div>

      <!-- System Prompt -->
      <div class="sub-label" style="margin-top:24px;">Tutor System Prompt</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px;">Leave blank to use the built-in Socratic method prompt.</div>
      <textarea class="prompt-area" id="tutor_system_prompt" placeholder="Custom system prompt… (leave blank for default)">${escAttr(s.tutor_system_prompt||'')}</textarea>
      <button class="prompt-reset" onclick="document.getElementById('tutor_system_prompt').value=''">↺ Reset to default</button>
    </div>

    <!-- TURN Server -->
    <div class="section" id="section-turn">
      <div class="section-head">
        <div class="section-icon" style="background:linear-gradient(135deg,rgba(var(--g1-rgb),0.15),rgba(var(--g2-rgb),0.15))">
          <svg class="icon icon-18" style="color:var(--g1)"><use href="#ic-meeting"/></svg>
        </div>
        <div><div class="section-title">Video Call (TURN Server)</div><div class="section-desc">Optional — needed for calls through strict NAT / home routers. Leave blank for STUN-only (works on most school networks).</div></div>
      </div>
      <div class="ai-params-grid">
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">TURN URL</div>
          <input class="field-input" id="turn_url" type="text" value="${escAttr(s.turn_url||'')}" placeholder="turn:your-server.example.com:3478">
        </div>
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">Username</div>
          <input class="field-input" id="turn_username" type="text" value="${escAttr(s.turn_username||'')}" placeholder="turnuser">
        </div>
        <div class="field-row" style="margin-bottom:0">
          <div class="field-label">Credential</div>
          <input class="field-input" id="turn_credential" type="password" placeholder="${s.turn_credential_set?'Saved — enter new to replace':'turnpassword'}">
        </div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:10px;">Install <code style="font-family:monospace;background:var(--bg3);padding:1px 5px;border-radius:4px">coturn</code> on your server for self-hosted TURN. See the README for a minimal config.</div>
    </div>

    <!-- Customize -->
    <div class="section" id="section-customize">
      <div class="section-head">
        <div class="section-icon" style="background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(var(--g2-rgb),0.15))">
          <svg class="icon icon-18" style="color:#a855f7"><use href="#ic-edit"/></svg>
        </div>
        <div><div class="section-title">Customize</div><div class="section-desc">Logo and color scheme — changes apply to all users school-wide</div></div>
      </div>

      <div class="sub-label">Logo</div>
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;flex-wrap:wrap;">
        <div id="logoPreviewBox" style="width:180px;height:52px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;padding:8px 12px;overflow:hidden;">
          <div id="brandLogoText" style="font-size:20px;font-weight:600;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">armu</div>
          <img id="brandLogoImg" src="" style="display:none;max-height:36px;max-width:156px;" alt="Logo"/>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn" onclick="document.getElementById('logoFileInput').click()"><svg class="icon icon-14"><use href="#ic-plus"/></svg> Upload Image</button>
            <button class="btn" id="logoRemoveBtn" onclick="removeLogo()">Use Default</button>
            <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="handleLogoUpload(this)">
          </div>
          <div id="logoFitRow" style="display:none;flex-direction:column;gap:10px;">
            <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
              <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;">Display</span>
              <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;"><input type="radio" name="logoFit" value="contain" checked> Fit</label>
              <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;"><input type="radio" name="logoFit" value="cover"> Crop</label>
              <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;"><input type="radio" name="logoFit" value="fill"> Stretch</label>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap;">Size</span>
              <input type="range" id="logoSizeSlider" min="16" max="94" value="36" style="width:120px;accent-color:var(--g1);" oninput="applyLogoSize(this.value)">
              <span id="logoSizeLabel" style="font-size:12px;color:var(--text3);min-width:32px;">36px</span>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text3);">PNG, JPEG or SVG · max 1 MB · replaces the "armu" text in the sidebar</div>
        </div>
      </div>

      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;flex-wrap:wrap;">
        <div id="iconLogoPreviewBox" style="width:52px;height:52px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
          <svg class="icon icon-18" style="color:var(--text3)"><use href="#ic-menu"/></svg>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);">Collapsed sidebar icon <span style="font-size:11px;font-weight:400;color:var(--text3);">(optional)</span></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn" onclick="document.getElementById('iconLogoFileInput').click()"><svg class="icon icon-14"><use href="#ic-plus"/></svg> Upload Icon</button>
            <button class="btn" id="iconLogoRemoveBtn" onclick="removeIconLogo()" style="display:none">Remove</button>
            <input type="file" id="iconLogoFileInput" accept="image/*" style="display:none" onchange="handleIconLogoUpload(this)">
          </div>
          <div style="font-size:11px;color:var(--text3);">Shown instead of the main logo when the sidebar is collapsed · square image recommended</div>
        </div>
      </div>

      <div class="sub-label">Typography</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;min-width:60px;">Font</span>
          <select id="fontFamily" style="padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;cursor:pointer;" onchange="previewFont()">
            <option value="Trebuchet MS">Trebuchet MS (default)</option>
            <optgroup label="System fonts">
              <option value="Arial">Arial</option>
              <option value="Georgia">Georgia</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Verdana">Verdana</option>
            </optgroup>
            <optgroup label="Web fonts">
              <option value="DM Sans">DM Sans</option>
              <option value="Inter">Inter</option>
              <option value="Roboto">Roboto</option>
              <option value="Roboto Condensed">Roboto Condensed</option>
              <option value="Noto Sans">Noto Sans</option>
              <option value="Nunito">Nunito</option>
              <option value="Poppins">Poppins</option>
              <option value="Space Grotesk">Space Grotesk</option>
              <option value="Plus Jakarta Sans">Plus Jakarta Sans</option>
              <option value="Lato">Lato</option>
            </optgroup>
          </select>
          <span id="fontPreviewText" style="font-size:14px;color:var(--text2);transition:font-family 0.2s;">The quick brown fox jumps over the lazy dog</span>
        </div>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;min-width:60px;">Size</span>
          <input type="range" id="fontSize" min="11" max="20" value="14" style="width:120px;accent-color:var(--g1);" oninput="document.getElementById('fontSizeLabel').textContent=this.value+'px'">
          <span id="fontSizeLabel" style="font-size:12px;color:var(--text3);min-width:32px;">14px</span>
        </div>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;min-width:60px;">Weight</span>
          <input type="range" id="fontWeight" min="300" max="700" step="100" value="400" style="width:120px;accent-color:var(--g1);" oninput="updateFontWeight(this.value)">
          <span id="fontWeightLabel" style="font-size:12px;color:var(--text3);min-width:60px;">Regular (400)</span>
        </div>

async function pullModel() {
  const input  = document.getElementById('pullModelInput');
  const model  = input.value.trim();
  if (!model) return;
  const btn    = document.getElementById('pullBtn');
  const status = document.getElementById('pullStatus');
  btn.disabled = true;
  status.textContent = 'Starting…';
  try {
    const resp = await fetch('/api/admin/ai/pull', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.error)           { status.textContent = 'Error: ' + d.error; break outer; }
          if (d.status === 'done') { status.textContent = '✓ ' + model + ' installed'; break outer; }
          const pct = d.total ? Math.round((d.completed || 0) / d.total * 100) : null;
          status.textContent = d.status + (pct !== null ? ' ' + pct + '%' : '');
        } catch {}
      }
    }
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false;
}

async function save() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  const provider = settings.ai_provider || 'ollama';
  const apiKey = provider === 'openai'
    ? (document.getElementById('ai_api_key_openai')?.value.trim() || '')
    : (document.getElementById('ai_api_key_anthropic')?.value.trim() || '');
  const payload = {
    school_name:                 document.getElementById('schoolName').value.trim(),
    hidden_tabs:                 settings.hidden_tabs || [],
    ai_enabled:                  settings.ai_enabled,
    tutor_enabled:               settings.tutor_enabled,
    digest_enabled:              settings.digest_enabled,
    nudges_enabled:              settings.nudges_enabled,
    deadline_reminders_enabled:  settings.deadline_reminders_enabled,
    weekly_digest_enabled:       settings.weekly_digest_enabled,
    message_scan_enabled:        settings.message_scan_enabled,
    ai_provider:                 provider,
    ollama_base_url:             document.getElementById('ollama_base_url')?.value.trim() || '',
    ai_api_base_url:             document.getElementById('ai_api_base_url')?.value.trim() || '',
    tutor_model:                 document.getElementById('tutor_model').value.trim(),
    advanced_model:              document.getElementById('advanced_model').value.trim(),
    tracker_model:               document.getElementById('tracker_model').value.trim(),
    tutor_temperature:           parseFloat(document.getElementById('tutor_temperature').value),
    tracker_temperature:         parseFloat(document.getElementById('tracker_temperature').value),
    tutor_top_p:                 parseFloat(document.getElementById('tutor_top_p').value),
    max_tokens:                  parseInt(document.getElementById('max_tokens').value, 10),
    tutor_system_prompt:         document.getElementById('tutor_system_prompt').value,
    turn_url:                    document.getElementById('turn_url')?.value.trim() || '',
    turn_username:               document.getElementById('turn_username')?.value.trim() || '',
  };
  if (apiKey) payload.ai_api_key = apiKey;
  const turnCred = document.getElementById('turn_credential')?.value.trim() || '';
  if (turnCred) payload.turn_credential = turnCred;
  const ok = await fetch('/api/admin/settings', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).then(r => r.ok).catch(() => false);
  btn.disabled = false;
  if (ok) {
    // Clear sessionStorage tab cache so notif.js picks up new visibility
    sessionStorage.removeItem('armu_hidden_tabs');
    sessionStorage.removeItem('armu_hidden_tabs_date');
    const msg = document.getElementById('saveMsg');
    msg.classList.add('visible');
    setTimeout(() => msg.classList.remove('visible'), 2500);
  } else {
    alert('Save failed. Please try again.');
  }
}

function initBranding(b) {
  if (!b) return;
  var c = b.colors || {};
  var map = {
    c_g1: c.g1, c_g2: c.g2, c_g3: c.g3,
    c_dark_bg: c.dark_bg, c_dark_bg2: c.dark_bg2, c_dark_bg3: c.dark_bg3, c_dark_bg4: c.dark_bg4,
    c_light_bg: c.light_bg, c_light_bg2: c.light_bg2, c_light_bg3: c.light_bg3, c_light_bg4: c.light_bg4,
    c_dark_text2: c.dark_text2, c_dark_text3: c.dark_text3,
    c_light_text2: c.light_text2, c_light_text3: c.light_text3,
  };
  Object.entries(map).forEach(function([id, val]) {
    var el = document.getElementById(id);
    if (el && val) { el.value = val; syncColorBox(el); }
  });
  var f = b.font || {};
  if (f.family) { var ff = document.getElementById('fontFamily'); if (ff) ff.value = f.family; previewFont(); }
  if (f.size)   { var fs = document.getElementById('fontSize'); if (fs) { fs.value = f.size; document.getElementById('fontSizeLabel').textContent = f.size + 'px'; } }
  if (f.weight) { var fw = document.getElementById('fontWeight'); if (fw) { fw.value = f.weight; updateFontWeight(f.weight); } }
  var fontMap = { font_dark_text: f.dark_text, font_light_text: f.light_text };
  Object.entries(fontMap).forEach(function([id, val]) {
    var el = document.getElementById(id);
    if (el && val) { el.value = val; syncColorBox(el); }
  });
  if (b.logo_data) {
    brandLogo = { data: b.logo_data, fit: b.logo_fit || 'contain', height: b.logo_height || 36 };
    var fitRadio = document.querySelector('input[name="logoFit"][value="' + (b.logo_fit || 'contain') + '"]');

  updateIconLogoPreview();
  renderAdminPalettes();
}

  ]);
  if (!s) {
    document.getElementById('mainContent').innerHTML = '<div style="padding:48px;text-align:center;color:var(--text3);">Failed to load settings.</div>';
    return;
  }
  renderAll(s);
  initBranding(branding);
  checkUpdate(true);
}

async function checkUpdate(silent) {
  const btn = document.getElementById('checkUpdateBtn');
  const status = document.getElementById('updateStatus');
  if (btn) btn.disabled = true;
  if (status && !silent) status.textContent = 'Checking…';
  try {
    const data = await fetch('/api/admin/update/check').then(r => r.json());
    const lv = document.getElementById('localVer');
    if (lv) lv.textContent = data.local || '—';
    if (data.error) {
      if (status) status.textContent = data.error;
    } else if (data.up_to_date) {
      if (status) status.textContent = silent ? '' : 'Already up to date.';
      const row = document.getElementById('updateApplyRow');
      if (row) row.style.display = 'none';
    } else {
      if (status) status.textContent = `${data.commits_behind} new commit${data.commits_behind !== 1 ? 's' : ''}`;
      const list = document.getElementById('updateCommitList');
      if (list) {
        list.innerHTML = (data.commits || []).map(c =>
          `<div style="font-size:12px;display:flex;gap:8px;align-items:baseline;">
            <code style="color:var(--g1);font-family:'DM Mono',monospace;flex-shrink:0">${c.hash}</code>
            <span style="color:var(--text2)">${c.message.replace(/</g,'&lt;')}</span>
          </div>`
        ).join('');
      }
      const row = document.getElementById('updateApplyRow');
      if (row) row.style.display = 'flex';
    }
  } catch(e) {
    if (status) status.textContent = 'Check failed';
  }
  if (btn) btn.disabled = false;
}
window.checkUpdate = checkUpdate;

async function applyUpdate() {
  const btn = document.getElementById('applyUpdateBtn');
  const log = document.getElementById('updateLog');
  const status = document.getElementById('updateStatus');
  if (btn) { btn.disabled = true; btn.textContent = 'Updating…'; }
  if (log) { log.style.display = 'block'; log.textContent = 'Running update…\n'; }
  if (status) status.textContent = '';
  try {
    const data = await fetch('/api/admin/update/apply', { method: 'POST' }).then(r => r.json());
    if (log) log.textContent = data.log || '';
    if (data.ok) {
      if (status) status.textContent = 'Server is restarting — refresh in a few seconds.';
      if (btn) { btn.disabled = false; btn.textContent = 'Refresh page'; btn.onclick = () => location.reload(); }
    } else {
      if (status) status.textContent = 'Update failed — see log above';
      if (btn) { btn.disabled = false; btn.textContent = 'Retry'; btn.onclick = applyUpdate; }
    }
  } catch(e) {
    if (status) status.textContent = 'Request failed';
    if (btn) { btn.disabled = false; btn.textContent = 'Retry'; btn.onclick = applyUpdate; }
  }
}
window.applyUpdate = applyUpdate;

boot();


</script>
