<div class="topbar">
  <svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-messages"/></svg>
  <span class="topbar-title">Messages</span>
  <div class="topbar-right">
    <div class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon icon-18"><use href="#ic-moon"/></svg>
    </div>
  </div>
</div>

<div class="msg-body">
  <div class="conv-panel">
    <div class="conv-panel-head">Conversations</div>
    <div class="conv-list" id="convList">
      <div style="padding:32px 16px;text-align:center;color:var(--text3);font-size:13px;">Loading…</div>
    </div>
  </div>
  <div class="thread-panel" id="threadPanel">
    <div class="no-conv" id="noConv">
      <svg class="icon" style="width:40px;height:40px;opacity:0.25;"><use href="#ic-messages"/></svg>
      <span style="font-size:13px;">Select a conversation</span>
    </div>
  </div>
</div>

<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();

let myId = null;
let conversations = [];
let activeIdx = -1;

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function buildConversations(messages) {
  const map = {};
  for (const m of messages) {
    const otherId   = m.sender_id === myId ? m.recipient_id : m.sender_id;
    const otherName = m.sender_id === myId
      ? (m.recipient_name || 'User #' + otherId)
      : (m.sender_name    || 'User #' + otherId);
    if (!map[otherId]) map[otherId] = {otherId, otherName, messages: []};
    map[otherId].messages.push(m);
    if (!map[otherId].otherName || map[otherId].otherName.startsWith('User #'))
      map[otherId].otherName = otherName;
  }
  for (const c of Object.values(map))
    c.messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  return Object.values(map).sort((a, b) => {
    const aLast = a.messages[a.messages.length - 1]?.created_at || '';
    const bLast = b.messages[b.messages.length - 1]?.created_at || '';
    return bLast.localeCompare(aLast);
  });
}

function renderConvList() {
  const el = document.getElementById('convList');
  if (!el) return;
  if (!conversations.length) {
    el.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--text3);font-size:13px;">No messages yet.</div>';
    return;
  }
  el.innerHTML = conversations.map((c, i) => {
    const last    = c.messages[c.messages.length - 1];
    const preview = last ? (last.sender_id === myId ? 'You: ' : '') + last.content : '';
    const unread  = c.messages.some(m => m.sender_id !== myId && !m.is_read);
    return `<div class="conv-item${i === activeIdx ? ' active' : ''}" onclick="openConv(${i})">
      <div class="avatar-sm">${initials(c.otherName)}</div>
      <div style="flex:1;min-width:0;">
        <div class="conv-name">${c.otherName}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="conv-time">${fmtTime(last?.created_at)}</div>
        ${unread ? '<div class="unread-dot"></div>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderThread(conv) {
  const panel = document.getElementById('threadPanel');
  if (!panel) return;
  panel.innerHTML = `
    <div class="thread-head">
      <div class="avatar-sm">${initials(conv.otherName)}</div>
      <div class="thread-head-name">${conv.otherName}</div>
    </div>
    <div class="thread-msgs" id="threadMsgs">
      ${conv.messages.length === 0
        ? '<div class="thread-empty">No messages yet. Say hello!</div>'
        : conv.messages.map(m => {
            const mine = m.sender_id === myId;
            return `<div class="msg-bubble ${mine ? 'mine' : 'theirs'}">
              <div class="bubble-text">${m.content}</div>
              <div class="bubble-time">${fmtTime(m.created_at)}</div>
            </div>`;
          }).join('')}
    </div>
    <div class="thread-compose">
      <textarea class="compose-input" id="composeInput" placeholder="Type a message…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg class="icon icon-18"><use href="#ic-send"/></svg>
      </button>
    </div>`;

  const msgs = document.getElementById('threadMsgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;

  const input = document.getElementById('composeInput');
  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
  }
}

function openConv(i) {
  activeIdx = i;
  renderConvList();
  renderThread(conversations[i]);
}

async function sendMsg() {
  if (activeIdx < 0) return;
  const input = document.getElementById('composeInput');
  const content = input?.value.trim();
  if (!content) return;
  const btn = document.getElementById('sendBtn');
  if (btn) btn.disabled = true;
  input.value = '';
  const conv = conversations[activeIdx];
  const res = await fetch('/api/messages/personal', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({recipient_id: conv.otherId, content}),
  }).then(r => r.json()).catch(() => null);
  if (btn) btn.disabled = false;
  if (res && !res.error) {
    conv.messages.push(res);
    conversations.splice(activeIdx, 1);
    conversations.unshift(conv);
    activeIdx = 0;
    renderConvList();
    renderThread(conv);
  }
}

window.openConv = openConv;
window.sendMsg  = sendMsg;

async function boot() {
  const [me, messages] = await Promise.all([
    fetch('/api/auth/me').then(r => r.json()).catch(() => null),
    fetch('/api/messages/personal').then(r => r.json()).catch(() => []),
  ]);
  if (!me || me.error) { location.href = '/login'; return; }
  myId = me.id;
  conversations = buildConversations(Array.isArray(messages) ? messages : []);
  renderConvList();
}

boot();
</script>
