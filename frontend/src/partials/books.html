
<div class="topbar">
<svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-books"></use></svg>
<span class="topbar-title">Books</span>
<input class="search-input" id="searchInput" oninput="onSearch()" placeholder="Search title, author, ISBN…" type="text"/>
<div class="topbar-right">
<button class="btn btn-primary" onclick="openModal()"><svg class="icon icon-14"><use href="#ic-plus"></use></svg> Add Book</button>
<div class="icon-btn" id="themeBtn" onclick="toggleTheme()"><svg class="icon icon-18"><use href="#ic-moon"></use></svg></div>
</div>
</div>
<div class="content">
<div class="book-table" id="bookTable">
<div class="empty">Loading…</div>
</div>
</div>

<script>


(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn')?.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

let books = [];
let editId = null;
let searchTimer = null;

function renderTable(data) {
  const tbl = document.getElementById('bookTable');
  if (!data.length) { tbl.innerHTML = '<div class="empty">No books found.</div>'; return; }
  tbl.innerHTML = `
    <div class="book-row header">
      <span>Title</span><span>Author</span><span>Genre</span>
      <span style="text-align:center">Copies</span><span style="text-align:center">Available</span><span></span>
    </div>
    ${data.map(b => `
      <div class="book-row">
        <span class="book-title">${esc(b.title)}</span>
        <span class="book-author">${esc(b.author)}</span>
        <span class="book-genre">${esc(b.genre||'—')}</span>
        <span style="text-align:center;color:var(--text2)">${b.total_copies}</span>
        <span style="text-align:center" class="${b.available_copies>0?'avail-good':'avail-none'}">${b.available_copies}</span>
        <span class="row-actions">
          <button class="act-btn" onclick='openModal(${JSON.stringify(b)})' title="Edit"><svg class="icon icon-14"><use href="#ic-edit"/></svg></button>
          <button class="act-btn del" onclick="deleteBook(${b.id},'${esc(b.title)}')" title="Delete"><svg class="icon icon-14"><use href="#ic-trash"/></svg></button>
        </span>
      </div>`).join('')}`;
}

async function loadBooks(q) {
  const url = q ? `/api/librarian/books?q=${encodeURIComponent(q)}` : '/api/librarian/books';
  books = await fetch(url).then(r => r.json()).catch(() => []);
  renderTable(books);
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadBooks(document.getElementById('searchInput').value.trim()), 300);
}

let enhanceDebounce = null;

function onTitleAuthorChange() {
  if (editId) return; // only for new books
  const title = document.getElementById('fTitle').value.trim();
  document.getElementById('enhanceRow').style.display = title ? '' : 'none';
}

function openModal(book) {
  editId = book ? book.id : null;
  document.getElementById('modalTitle').textContent = book ? 'Edit Book' : 'Add Book';
  document.getElementById('fTitle').value  = book?.title  || '';
  document.getElementById('fAuthor').value = book?.author || '';
  document.getElementById('fIsbn').value   = book?.isbn   || '';
  document.getElementById('fGenre').value  = book?.genre  || '';
  document.getElementById('fPages').value  = book?.pages  || '';
  document.getElementById('fCopies').value = book?.total_copies || 1;
  document.getElementById('fCover').value  = book?.cover_url || '';
  document.getElementById('fDesc').value   = book?.description || '';
  document.getElementById('coverPicker').innerHTML = '';
  document.getElementById('enhanceRow').style.display = (!book && document.getElementById('fTitle').value) ? '' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editId = null;
}

async function enhance() {
  const title  = document.getElementById('fTitle').value.trim();
  const author = document.getElementById('fAuthor').value.trim();
  if (!title) return;

  const btn = document.getElementById('enhanceBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Working…';

  // Run covers and description fetch in parallel
  const [coverResult] = await Promise.all([
    fetch(`/api/librarian/book-covers?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`)
      .then(r => r.json()).catch(() => ({ covers: [] })),
    streamDescription(title, author),
  ]);

  // Auto-fill author and genre if the fields are empty
  if (coverResult.author && !document.getElementById('fAuthor').value.trim())
    document.getElementById('fAuthor').value = coverResult.author;
  if (coverResult.genre && !document.getElementById('fGenre').value.trim())
    document.getElementById('fGenre').value = coverResult.genre;

  renderCovers(coverResult.covers || []);
  btn.disabled = false;
  btn.innerHTML = '<svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Enhance again';
}

async function streamDescription(title, author) {
  const desc = document.getElementById('fDesc');
  desc.value = '';
  desc.placeholder = 'Generating…';
  try {
    const resp = await fetch(
      `/api/librarian/book-description?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`
    );
    if (!resp.ok) { desc.placeholder = 'Short synopsis…'; return; }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      desc.value += decoder.decode(value, { stream: true });
    }
  } catch (_) {}
  desc.placeholder = 'Short synopsis…';
}

function renderCovers(urls) {
  const picker = document.getElementById('coverPicker');
  if (!urls.length) {
    picker.innerHTML = '<span class="cover-loading">No covers found on Open Library</span>';
    return;
  }
  picker.innerHTML = urls.map((url, i) =>
    `<div class="cover-opt" id="copt-${i}" onclick="selectCover('${url}',${i})">
       <img src="${url}" alt="Cover option ${i+1}" onerror="this.parentElement.style.display='none'">
     </div>`
  ).join('');
  // Pre-select first one
  selectCover(urls[0], 0);
}

function selectCover(url, idx) {
  document.getElementById('fCover').value = url;
  document.querySelectorAll('.cover-opt').forEach((el, i) =>
    el.classList.toggle('selected', i === idx)
  );
}

async function saveBook() {
  const payload = {
    title:        document.getElementById('fTitle').value.trim(),
    author:       document.getElementById('fAuthor').value.trim(),
    isbn:         document.getElementById('fIsbn').value.trim(),
    genre:        document.getElementById('fGenre').value.trim(),
    pages:        document.getElementById('fPages').value || null,
    total_copies: document.getElementById('fCopies').value || 1,
    cover_url:    document.getElementById('fCover').value.trim(),
    description:  document.getElementById('fDesc').value.trim(),
  };
  if (!payload.title || !payload.author) { alert('Title and author are required.'); return; }
  const url    = editId ? `/api/librarian/books/${editId}` : '/api/librarian/books';
  const method = editId ? 'PATCH' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (!res.ok) { const e = await res.json().catch(()=>{}); alert(e?.error || 'Save failed'); return; }
  closeModal();
  loadBooks(document.getElementById('searchInput').value.trim());
}

async function deleteBook(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const res = await fetch(`/api/librarian/books/${id}`, { method: 'DELETE' });
  if (!res.ok) { const e = await res.json().catch(()=>{}); alert(e?.error || 'Delete failed'); return; }
  loadBooks(document.getElementById('searchInput').value.trim());
}

async function boot() {
  const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
  
  
  
  loadBooks();
}
boot();


</script>
