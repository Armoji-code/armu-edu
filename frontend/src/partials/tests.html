
<div class="topbar">
<div class="topbar-title">Tests</div>
<div class="topbar-right">
<div class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><svg class="icon icon-18"><use href="#ic-moon" id="themeIcon"></use></svg></div>
<div class="icon-btn" title="Notifications"><svg class="icon icon-18"><use href="#ic-bell"></use></svg></div>
</div>
</div>
<div class="content">
<!-- AI RECOMMENDATION -->
<div style="background:linear-gradient(135deg,rgba(61,214,140,0.08),rgba(56,189,248,0.08));border:1px solid var(--border-accent);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start;">
<div style="flex-shrink:0;color:var(--g1)"><svg class="icon icon-20"><use href="#ic-tutor"></use></svg></div>
<div>
<div style="font-size:11px;font-weight:600;color:var(--g1);letter-spacing:0.5px;margin-bottom:5px">AI RECOMMENDATION</div>
<div id="aiRec" style="font-size:13px;color:var(--text);line-height:1.5">Analysing your upcoming tests…</div>
</div>
</div>
<!-- HEADER -->
<div class="section-header" style="margin-bottom:14px">
<div>
<div class="section-title">Upcoming Assessments</div>
<div id="countLabel" style="font-size:12px;color:var(--text3);margin-top:2px"></div>
</div>
</div>
<div id="testList"><div class="empty">Loading…</div></div>
</div>

<script>


const SUBJECT_ICON = {
  math:'📐', algebra:'📐', geometry:'📐', calculus:'📐',
  chemistry:'⚗️', physics:'⚡', biology:'🔬', science:'🔬',
  english:'📚', literature:'📚', history:'📖', geography:'🌍',
  art:'🎨', music:'🎵', pe:'🏃', computer:'💻',
};

function subjectIcon(name) {
  const lower = (name || '').toLowerCase();
  return Object.entries(SUBJECT_ICON).find(([k]) => lower.includes(k))?.[1] ?? '📝';
}

async function boot() {
  const me = await api('/api/auth/me');
  if (!me) { window.location.href = '/login'; return; }
  setUser(me);
  const saved = localStorage.getItem('theme');
  if (saved) setTheme(saved);

  const tests = await api('/api/tests');
  if (tests && tests.length) {
    render(tests);
    renderAiRec(tests);
  } else {
    document.getElementById('testList').innerHTML = '<div class="empty">No upcoming tests.</div>';
    document.getElementById('aiRec').textContent = 'No upcoming tests — enjoy the break!';
    document.getElementById('countLabel').textContent = '0 assessments';
  }
}

function render(tests) {
  document.getElementById('countLabel').textContent = `${tests.length} assessment${tests.length !== 1 ? 's' : ''}`;

  document.getElementById('testList').innerHTML = tests.map(t => {
    const days    = daysUntil(t.due_date);
    const urgency = days <= 2 ? 'urgent' : days <= 5 ? 'soon' : '';
    const dueText = relDue(t.due_date);
    const dateStr = new Date(t.due_date).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const icon    = subjectIcon(t.subject_name);

    // Urgency bar: fills from 100% (14 days out) to 0% (today), red when urgent
    const barPct  = Math.max(0, Math.min(100, Math.round((days / 14) * 100)));
    const barCol  = days <= 2 ? '#f87171' : days <= 5 ? '#fbbf24' : 'var(--g1)';

    return `<div class="test-item">
      <div class="test-icon">${icon}</div>
      <div style="flex:1;min-width:0;">
        <div class="assignment-subject">${esc(t.subject_name || '')}</div>
        <div class="assignment-title">${esc(t.title)}</div>
        <div class="test-meta">${esc(dateStr)}</div>
        <div class="urgency-bar">
          <div class="urgency-fill" style="width:${barPct}%;background:${barCol};"></div>
        </div>
      </div>
      <div class="test-days ${urgency}">${dueText}</div>
    </div>`;
  }).join('');
}

function renderAiRec(tests) {
  if (!tests.length) { document.getElementById('aiRec').textContent = 'No upcoming tests.'; return; }
  const first  = tests[0];
  const second = tests[1];
  const days0  = daysUntil(first.due_date);

  let text = `<strong>Priority: ${esc(first.subject_name || first.title)} ${days0 <= 1 ? 'tomorrow' : `in ${days0} days`}.</strong> Start reviewing now`;
  if (second) {
    const days1 = daysUntil(second.due_date);
    text += `, then shift focus to ${esc(second.subject_name || second.title)} (${relDue(second.due_date)})`;
  }
  text += '.';
  if (tests.length > 2) text += ` ${tests.length - 2} more assessment${tests.length > 3 ? 's' : ''} coming up.`;
  document.getElementById('aiRec').innerHTML = text;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function daysUntil(iso) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d   = new Date(iso); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}
function relDue(iso) {
  const d = daysUntil(iso);
  if (d < 0)   return 'Overdue';
  if (d === 0)  return 'Today';
  if (d === 1)  return 'Tomorrow';
  return `In ${d}d.`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setUser(u) {
  const initials = u.name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  
  
  
}
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById('themeIcon').setAttribute('href', t === 'dark' ? '#ic-moon' : '#ic-sun');
  localStorage.setItem('theme', t);
}
function toggleTheme() { setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'); }
async function api(url) {
  try {
    const r = await fetch(url, { credentials:'include' });
    if (r.status === 401) return null;
    return r.ok ? r.json() : null;
  } catch { return null; }
}

boot();


</script>
