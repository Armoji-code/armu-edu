
<style>
/* ── Lobby ─────────────────────────────────────── */
.lobby-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.lobby-title{font-size:18px;font-weight:600;}
.meeting-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.meeting-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:12px;}
.meeting-card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.meeting-card-dot{width:8px;height:8px;border-radius:50%;background:var(--g1);flex-shrink:0;}
.meeting-card-meta{display:flex;gap:12px;font-size:12px;color:var(--text3);}
.meeting-card-actions{display:flex;gap:8px;margin-top:4px;}

/* ── In-call topbar info ───────────────────────── */
.call-ctrl-group{display:none;align-items:center;gap:8px;}
.call-ctrl-group.visible{display:flex;}
.call-info{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px;}
.call-info strong{color:var(--text);font-weight:600;}

/* ── In-call layout ───────────────────────────── */
#callWrap{display:flex;height:100%;overflow:hidden;}
#videoArea{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* ── Video grid ───────────────────────────────── */
.video-grid{flex:1;display:grid;gap:8px;padding:16px;background:var(--bg);align-content:start;overflow-y:auto;}
.video-grid.solo{display:flex;align-items:center;justify-content:center;}
.video-grid.duo{grid-template-columns:1fr 1fr;}
.video-grid.multi{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
.video-tile{background:var(--bg2);border-radius:var(--radius);overflow:hidden;position:relative;aspect-ratio:16/9;}
.video-grid.solo .video-tile{width:100%;max-height:100%;}
.video-tile video{width:100%;height:100%;object-fit:cover;display:block;}
.tile-name{position:absolute;bottom:8px;left:10px;font-size:11px;font-weight:600;color:#fff;background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:20px;}
.tile-avatar{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--g1),var(--g2));}

/* ── Floating call controls — wb-toolbar style ── */
.call-ctrl-panel{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:3px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:7px;
  box-shadow:var(--shadow);
  user-select:none;
}
.call-ctrl-panel.horizontal{flex-direction:row;align-items:center;}
.call-ctrl-panel.horizontal .call-sep{width:1px;height:24px;margin:0 3px;}

.call-panel-btn{
  width:36px;height:36px;border-radius:var(--radius-sm);
  border:1px solid transparent;background:transparent;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.call-panel-btn:hover{background:var(--bg3);color:var(--text);}
.call-panel-btn.off{background:rgba(239,68,68,0.15);color:#ef4444;}
.call-panel-btn.panel-active{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.15),rgba(var(--g2-rgb),0.15));border-color:var(--border-accent);color:var(--g1);}
.call-panel-btn.leave{background:#ef4444;color:#fff;border-color:transparent;}
.call-panel-btn.leave:hover{background:#dc2626;}

.call-sep{height:1px;background:var(--border);margin:3px 0;}

/* ── Panel grip & meta buttons ───────────────── */
.panel-grip{
  display:flex;align-items:center;justify-content:center;
  padding:4px;border-radius:var(--radius-sm);
  color:var(--text3);cursor:grab;align-self:center;
}
.panel-grip:hover{background:var(--bg3);color:var(--text2);}
.panel-grip:active{cursor:grabbing;}
.panel-meta-btn{
  width:24px;height:24px;padding:0;
  border-radius:var(--radius-sm);border:none;
  background:transparent;color:var(--text3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);align-self:center;
}
.panel-meta-btn:hover{background:var(--bg3);color:var(--text2);}

/* ── Reveal button (shown when panel hidden) ── */
.call-ctrl-reveal{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  z-index:11;display:none;
  width:34px;height:34px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border);
  box-shadow:var(--shadow);color:var(--text3);
  cursor:pointer;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.call-ctrl-reveal:hover{background:var(--bg3);color:var(--text);}

/* ── Participants / Chat sidebar ────────────────── */
.call-sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.call-sidebar.hidden{display:none;}
.call-sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.call-sidebar-tab{flex:1;padding:10px 0;font-size:12px;font-weight:600;color:var(--text3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);}
.call-sidebar-tab.active{color:var(--g1);border-bottom-color:var(--g1);}
.call-sidebar-pane{display:none;flex:1;flex-direction:column;overflow:hidden;}
.call-sidebar-pane.active{display:flex;}
.participant-row{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;}
.participant-av{width:28px;height:28px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
/* chat pane */
.call-chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.call-chat-msgs::-webkit-scrollbar{width:3px;}
.call-chat-msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.chat-msg{display:flex;flex-direction:column;gap:2px;}
.chat-msg-meta{font-size:10px;color:var(--text3);}
.chat-msg-meta.me{text-align:right;}
.chat-msg-bubble{font-size:12px;padding:7px 10px;border-radius:10px;background:var(--bg3);color:var(--text);word-break:break-word;line-height:1.4;max-width:100%;}
.chat-msg.mine .chat-msg-bubble{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.18),rgba(var(--g2-rgb),0.18));border:1px solid var(--border-accent);align-self:flex-end;}
.chat-msg.mine{align-items:flex-end;}
.call-chat-compose{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.call-chat-input{flex:1;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;outline:none;resize:none;line-height:1.4;}
.call-chat-input:focus{border-color:var(--border-accent);}
.call-chat-send{width:32px;height:32px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--g1),var(--g2));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style>

<!-- Topbar -->
<div class="topbar" id="meetingTopbar">
  <svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-meeting"></use></svg>
  <span class="topbar-title" id="topbarTitle">Meeting</span>

  <div class="call-ctrl-group" id="callCtrlGroup">
    <div class="call-info">
      <strong id="callTitleLabel"></strong>
      <span id="callDuration"></span>
    </div>
  </div>

  <div class="topbar-right" id="topbarRight">
    <div class="icon-btn" id="themeBtn" onclick="toggleTheme()">
      <svg class="icon icon-18"><use href="#ic-moon"></use></svg>
    </div>
  </div>
</div>

<div class="content" id="mainContent" style="padding:28px;">
  <div style="padding:48px;text-align:center;color:var(--text3);">Loading…</div>
</div>

<!-- Start Meeting Modal -->
<div class="modal-backdrop" id="newMeetingModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Start a Meeting</div>
    <div class="field" style="margin-bottom:14px;">
      <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;">Title</label>
      <input class="pw-input" id="newMeetingTitle" placeholder="e.g. Math Study Session" type="text" style="width:100%;"/>
    </div>
    <div class="field" id="classFieldRow" style="margin-bottom:14px;">
      <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;">
        Class <span style="font-weight:400;">(optional)</span>
      </label>
      <select class="filter-select" id="newMeetingClass" style="width:100%;">
        <option value="">No class — share the link manually</option>
      </select>
    </div>

      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewMeeting()">Start</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
var me, meetings=[], iceServers=[], socket=null, localStream=null, screenStream=null;
var peerConnections={}, peerNames={}, currentMeeting=null;
var callStartTime=null, durationInterval=null;
var micOn=true, camOn=true, screenOn=false, participantsVisible=true;
var _panelDragCleanup = null;

// ── Socket ─────────────────────────────────────────────────────────────────────
function initSocket() {
  socket = io();
  socket.emit('user_join', {user_id: me.id});
  socket.on('meeting:peers',      ({peers}) => { peers.forEach(p => { peerNames[p.id]=p.name; createOffer(p.id); }); renderParticipants(); });
  socket.on('meeting:peer-joined',({id,name}) => { peerNames[id]=name; ensurePeerConnection(id); renderParticipants(); });
  socket.on('meeting:peer-left',  ({id}) => { closePeer(id); renderParticipants(); });
  socket.on('meeting:chat', ({uid, name, text}) => { appendChatMsg(uid, name, text, uid === String(me.id)); });
  socket.on('meeting:signal', async ({from,data}) => {
    if (data.type==='offer') await handleOffer(from,data);
    else if (data.type==='answer') { const pc=peerConnections[from]; if(pc) await pc.setRemoteDescription(new RTCSessionDescription(data)); }
    else if (data.candidate) { const pc=peerConnections[from]; if(pc) await pc.addIceCandidate(new RTCIceCandidate(data)).catch(()=>{}); }
  });
}

// ── WebRTC ─────────────────────────────────────────────────────────────────────
function ensurePeerConnection(peerId) {
  if (peerConnections[peerId]) return peerConnections[peerId];
  const pc = new RTCPeerConnection({iceServers});
  peerConnections[peerId] = pc;
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const remoteStream = new MediaStream();
  pc.ontrack = e => { remoteStream.addTrack(e.track); updateRemoteVideo(peerId, remoteStream); };
  pc.onicecandidate = e => { if (e.candidate) signal(peerId, e.candidate.toJSON()); };
  return pc;
}
async function createOffer(peerId) {
  const pc = ensurePeerConnection(peerId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  signal(peerId, offer);
}
async function handleOffer(from, offer) {
  const pc = ensurePeerConnection(from);
  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  signal(from, answer);
}
function signal(to, data) { socket.emit('meeting:signal', {to, data}); }
function closePeer(id) {
  if (peerConnections[id]) { peerConnections[id].close(); delete peerConnections[id]; }
  delete peerNames[id];
  const tile = document.getElementById('tile-'+id);
  if (tile) tile.remove();
  updateGridLayout();
}

// ── Video tiles ────────────────────────────────────────────────────────────────
function addLocalTile() {
  const grid = document.getElementById('videoGrid');
  if (!grid) return;
  const tile = document.createElement('div');
  tile.className = 'video-tile'; tile.id = 'tile-local';
  const video = document.createElement('video');
  video.autoplay = true; video.muted = true; video.playsInline = true;
  video.srcObject = localStream;
  tile.appendChild(video);
  const label = document.createElement('div');
  label.className = 'tile-name'; label.textContent = (me?.name || 'You') + ' (you)';
  tile.appendChild(label);
  grid.appendChild(tile);
  updateGridLayout();
}
function updateRemoteVideo(peerId, stream) {
  let tile = document.getElementById('tile-'+peerId);
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'video-tile'; tile.id = 'tile-'+peerId;
    const video = document.createElement('video');
    video.autoplay = true; video.playsInline = true;
    tile.appendChild(video);
    const label = document.createElement('div');
    label.className = 'tile-name'; label.textContent = peerNames[peerId] || peerId;
    tile.appendChild(label);
    document.getElementById('videoGrid')?.appendChild(tile);
    updateGridLayout();
  }
  tile.querySelector('video').srcObject = stream;
}
function updateGridLayout() {
  const grid = document.getElementById('videoGrid');
  if (!grid) return;
  const n = grid.children.length;
  grid.className = 'video-grid ' + (n<=1?'solo':n<=2?'duo':'multi');
}

// ── Participants ───────────────────────────────────────────────────────────────
function renderParticipants() {
  const list = document.getElementById('participantList');
  if (!list) return;
  const all = [{id:'local', name:(me?.name||'You')+'  (you)'}, ...Object.entries(peerNames).map(([id,name])=>({id,name}))];
  list.innerHTML = all.map(p => `
    <div class="participant-row">
      <div class="participant-av">${p.name.slice(0,2).toUpperCase()}</div>
      <span>${p.name}</span>
    </div>`).join('');
}
var _sidebarTab = 'people';

function switchSidebarTab(tab) {
  const sidebar = document.getElementById('callSidebar');
  if (!sidebar) return;

  if (_sidebarTab === tab && !sidebar.classList.contains('hidden')) {
    // clicking same tab again hides sidebar
    sidebar.classList.add('hidden');
    participantsVisible = false;
    document.getElementById('btnParticipants')?.classList.remove('panel-active');
    document.getElementById('btnChat')?.classList.remove('panel-active');
    return;
  }

  sidebar.classList.remove('hidden');
  participantsVisible = true;
  _sidebarTab = tab;

  ['people','chat'].forEach(function(t) {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
    document.getElementById('pane' + t)?.classList.toggle('active', t === tab);
  });
  document.getElementById('btnParticipants')?.classList.toggle('panel-active', tab === 'people');
  document.getElementById('btnChat')?.classList.toggle('panel-active', tab === 'chat');

  if (tab === 'chat') {
    const msgs = document.getElementById('chatMsgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    setTimeout(function(){ document.getElementById('chatInput')?.focus(); }, 50);
    // Clear unread dot
    document.getElementById('tabChat')?.querySelector('.chat-unread')?.remove();
  }
}

function goToWhiteboard() {
  window.__wbAutoMode = 'meeting';
  if (window.navigate) window.navigate('/whiteboard');
}

function sendChatMsg() {
  const input = document.getElementById('chatInput');
  const text = input ? input.value.trim() : '';
  if (!text || !currentMeeting || !socket) return;
  socket.emit('meeting:chat', {room_code: currentMeeting.room_code, text: text});
  input.value = '';
  input.focus();
}

function appendChatMsg(uid, name, text, mine) {
  const msgs = document.getElementById('chatMsgs');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = 'chat-msg' + (mine ? ' mine' : '');
  div.innerHTML = '<div class="chat-msg-meta' + (mine ? ' me' : '') + '">' + esc(name) + '</div>'
    + '<div class="chat-msg-bubble">' + esc(text) + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  // Show unread indicator if chat pane not visible
  if (_sidebarTab !== 'chat' || document.getElementById('callSidebar')?.classList.contains('hidden')) {
    const tab = document.getElementById('tabChat');
    if (tab && !tab.querySelector('.chat-unread')) {
      const dot = document.createElement('span');
      dot.className = 'chat-unread';
      dot.style.cssText = 'display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g1);margin-left:4px;vertical-align:middle;';
      tab.appendChild(dot);
    }
  }
}

// ── Floating panel ─────────────────────────────────────────────────────────────
function initDraggablePanel() {
  const panel = document.getElementById('callCtrlPanel');
  const area  = document.getElementById('videoArea');
  if (!panel || !area) return;

  // Restore orientation
  if (localStorage.getItem('call-panel-orient') === 'h') panel.classList.add('horizontal');
  updateOrientIcon();

  // Restore dragged position, clamped to current area bounds
  const saved = JSON.parse(localStorage.getItem('call-panel-pos') || 'null');
  if (saved) {
    requestAnimationFrame(() => {
      const ar = area.getBoundingClientRect();
      const x = Math.max(0, Math.min(ar.width  - panel.offsetWidth,  saved.x));
      const y = Math.max(0, Math.min(ar.height - panel.offsetHeight, saved.y));
      panel.style.right = 'auto';
      panel.style.transform = 'none';
      panel.style.left = x + 'px';
      panel.style.top  = y + 'px';
    });
  }

  // Drag via grip
  const grip = document.getElementById('panelGrip');
  let dragging = false, ox = 0, oy = 0;

  function startDrag(cx, cy) {
    dragging = true;
    const r = panel.getBoundingClientRect();
    ox = cx - r.left; oy = cy - r.top;
  }
  function moveDrag(cx, cy) {
    if (!dragging) return;
    const ar = area.getBoundingClientRect();
    let x = cx - ar.left - ox;
    let y = cy - ar.top  - oy;
    x = Math.max(0, Math.min(ar.width  - panel.offsetWidth,  x));
    y = Math.max(0, Math.min(ar.height - panel.offsetHeight, y));
    panel.style.left = x + 'px'; panel.style.top = y + 'px';
    panel.style.right = 'auto'; panel.style.transform = 'none';
    localStorage.setItem('call-panel-pos', JSON.stringify({x, y}));
  }
  function stopDrag() { dragging = false; }

  const onMM = e => moveDrag(e.clientX, e.clientY);
  const onTM = e => { if (e.touches[0]) moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); };

  grip.addEventListener('mousedown',  e => { startDrag(e.clientX, e.clientY); e.preventDefault(); });
  grip.addEventListener('touchstart', e => { if (e.touches[0]) startDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
  document.addEventListener('mousemove',  onMM);
  document.addEventListener('touchmove',  onTM, {passive:false});
  document.addEventListener('mouseup',  stopDrag);
  document.addEventListener('touchend', stopDrag);

  _panelDragCleanup = () => {
    document.removeEventListener('mousemove',  onMM);
    document.removeEventListener('touchmove',  onTM);
    document.removeEventListener('mouseup',  stopDrag);
    document.removeEventListener('touchend', stopDrag);
  };
}

function togglePanelOrientation() {
  const panel = document.getElementById('callCtrlPanel');
  if (!panel) return;
  panel.classList.toggle('horizontal');
  localStorage.setItem('call-panel-orient', panel.classList.contains('horizontal') ? 'h' : 'v');
  updateOrientIcon();
}

function updateOrientIcon() {
  const btn = document.getElementById('btnOrient');
  if (!btn) return;
  const horiz = document.getElementById('callCtrlPanel')?.classList.contains('horizontal');
  btn.title = horiz ? 'Switch to vertical' : 'Switch to horizontal';
  // Icon shows the OTHER layout (what clicking will switch to)
  btn.innerHTML = horiz
    ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="3" y="2" width="3" height="10" rx="1"/><rect x="8" y="2" width="3" height="10" rx="1"/></svg>'
    : '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="3" width="10" height="3" rx="1"/><rect x="2" y="8" width="10" height="3" rx="1"/></svg>';
}

function hidePanelControls() {
  const panel  = document.getElementById('callCtrlPanel');
  const reveal = document.getElementById('callCtrlReveal');
  const area   = document.getElementById('videoArea');
  if (!panel || !reveal || !area) return;
  // Sync reveal position to where the panel currently is
  const pr = panel.getBoundingClientRect();
  const ar = area.getBoundingClientRect();
  reveal.style.left      = (pr.left - ar.left) + 'px';
  reveal.style.top       = (pr.top  - ar.top)  + 'px';
  reveal.style.right     = 'auto';
  reveal.style.transform = 'none';
  panel.style.display  = 'none';
  reveal.style.display = 'flex';
}

function showPanelControls() {
  const panel  = document.getElementById('callCtrlPanel');
  const reveal = document.getElementById('callCtrlReveal');
  if (panel)  panel.style.display  = '';
  if (reveal) reveal.style.display = 'none';
}

// ── Join / Leave ───────────────────────────────────────────────────────────────
async function joinMeeting(meeting) {
  currentMeeting = meeting;
  peerConnections={}; peerNames={};
  try {
    localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
  } catch(e) { alert('Could not access camera/microphone: '+e.message); return; }

  document.getElementById('topbarTitle').textContent = '';
  document.getElementById('callTitleLabel').textContent = meeting.title;
  document.getElementById('callCtrlGroup').classList.add('visible');

  const content = document.getElementById('mainContent');
  content.style.padding = '0';
  content.style.overflow = 'hidden';
  micOn=true; camOn=true; screenOn=false; participantsVisible=true;

  content.innerHTML = buildCallHTML();
  addLocalTile(); renderParticipants();
  initDraggablePanel();

  callStartTime = Date.now();
  durationInterval = setInterval(() => {
    const s = Math.floor((Date.now()-callStartTime)/1000);
    const el = document.getElementById('callDuration');
    if (el) el.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }, 1000);
  socket.emit('meeting:join', {room_code: meeting.room_code});
  setMeetingCleanup();
}

async function leaveMeeting() {
  if (!currentMeeting) return;
  if (window.hideMeetingPip) window.hideMeetingPip();
  window.__meetingState = null;
  if (_panelDragCleanup) { _panelDragCleanup(); _panelDragCleanup = null; }
  if (socket) socket.emit('meeting:leave', {room_code: currentMeeting.room_code});
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections={}; peerNames={};
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream=null; }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream=null; }
  clearInterval(durationInterval);
  currentMeeting=null;

  const topTitle = document.getElementById('topbarTitle');
  if (topTitle) topTitle.textContent = 'Meeting';
  const ctrlGrp = document.getElementById('callCtrlGroup');
  if (ctrlGrp) ctrlGrp.classList.remove('visible');
  const durEl = document.getElementById('callDuration');
  if (durEl) durEl.textContent = '';

  const content = document.getElementById('mainContent');
  if (content) { content.style.padding = ''; content.style.overflow = ''; }
  refreshMeetings();
}

// ── Controls ───────────────────────────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  localStream?.getAudioTracks().forEach(t => t.enabled=micOn);
  const b = document.getElementById('btnMic');
  if (b) b.className = `call-panel-btn${micOn?'':' off'}`;
  if (window.syncPipState) window.syncPipState();
}
function toggleCam() {
  camOn = !camOn;
  localStream?.getVideoTracks().forEach(t => t.enabled=camOn);
  const v = document.querySelector('#tile-local video');
  if (v) v.style.display = camOn ? '' : 'none';
  const b = document.getElementById('btnCam');
  if (b) b.className = `call-panel-btn${camOn?'':' off'}`;
  if (window.syncPipState) window.syncPipState();
}
async function toggleScreen() {
  if (!screenOn) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({video:true});
      const track = screenStream.getVideoTracks()[0];
      Object.values(peerConnections).forEach(pc => {
        pc.getSenders().find(s=>s.track?.kind==='video')?.replaceTrack(track);
      });
      const lv = document.querySelector('#tile-local video');
      if (lv) lv.srcObject = screenStream;
      track.onended = () => { screenOn=true; toggleScreen(); };
      screenOn=true;
      const b = document.getElementById('btnScreen');
      if (b) b.className = 'call-panel-btn off';
    } catch(e) {}
  } else {
    screenStream?.getTracks().forEach(t => t.stop()); screenStream=null;
    const track = localStream?.getVideoTracks()[0];
    if (track) Object.values(peerConnections).forEach(pc => {
      pc.getSenders().find(s=>s.track?.kind==='video')?.replaceTrack(track);
    });
    const lv = document.querySelector('#tile-local video');
    if (lv && localStream) lv.srcObject = localStream;
    screenOn=false;
    const b = document.getElementById('btnScreen');
    if (b) b.className = 'call-panel-btn';
  }
}

// ── Lobby ──────────────────────────────────────────────────────────────────────
function renderLobby() {
  const c = document.getElementById('mainContent');
  if (!c || currentMeeting) return;
  c.style.padding = '28px';
  c.innerHTML = `
    <div class="lobby-header">
      <div class="lobby-title">Active Meetings</div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg class="icon icon-14"><use href="#ic-plus"/></svg> Start Meeting
      </button>
    </div>
    <div class="meeting-grid" id="meetingGrid"></div>`;
  const grid = document.getElementById('meetingGrid');
  if (!meetings.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--text3);">
      <svg class="icon" style="width:40px;height:40px;opacity:0.25;margin-bottom:12px;"><use href="#ic-meeting"/></svg>
      <div style="font-size:14px;font-weight:500;margin-bottom:6px;">No active meetings</div>
      <div style="font-size:13px;">Start one and share the link with your class.</div>
    </div>`;
    return;
  }
  meetings.forEach(m => {
    const card = document.createElement('div');
    card.className = 'meeting-card';
    const canEnd = m.host_id===me.id || me.role==='admin' || me.role==='teacher';
    card.innerHTML = `
      <div class="meeting-card-title"><span class="meeting-card-dot"></span>${m.title}</div>
      <div class="meeting-card-meta"><span>Host: ${m.host_name}</span><span>${m.participant_count} online</span></div>
      <div class="meeting-card-actions">
        <button class="btn btn-primary" onclick="joinMeeting(${JSON.stringify(m).replace(/"/g,'&quot;')})">Join</button>
        ${canEnd?`<button class="btn" onclick="endMeeting(${m.id})">End</button>`:''}
      </div>`;
    grid.appendChild(card);
  });
}
async function refreshMeetings() {
  meetings = await fetch('/api/meetings').then(r=>r.json()).catch(()=>[]);
  if (!currentMeeting) renderLobby();
}

// ── Modal ──────────────────────────────────────────────────────────────────────
async function openModal() {
  const sel = document.getElementById('newMeetingClass');
  if (me.role==='teacher'||me.role==='admin') {
    const classes = await fetch('/api/teacher/classes').then(r=>r.ok?r.json():[]).catch(()=>[]);
    classes.forEach(c => { const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; sel.appendChild(o); });
  } else { document.getElementById('classFieldRow').style.display='none'; }
  document.getElementById('newMeetingModal').style.display='flex';
  document.getElementById('newMeetingTitle').focus();
}
function closeModal() { document.getElementById('newMeetingModal').style.display='none'; }
async function confirmNewMeeting() {
  const title = document.getElementById('newMeetingTitle').value.trim()||'Meeting';
  const class_id = document.getElementById('newMeetingClass').value||null;
  const m = await fetch('/api/meetings',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,class_id:class_id?parseInt(class_id):null})}).then(r=>r.json()).catch(()=>null);
  closeModal();
  if (m?.id) { await refreshMeetings(); joinMeeting(m); }
}
async function endMeeting(id) {
  await fetch(`/api/meetings/${id}`,{method:'DELETE'});
  refreshMeetings();
}

// ── Rejoin (restore from PiP) ──────────────────────────────────────────────────
function rejoinCallUI() {
  document.getElementById('topbarTitle').textContent = '';
  document.getElementById('callTitleLabel').textContent = currentMeeting.title;
  document.getElementById('callCtrlGroup').classList.add('visible');

  const content = document.getElementById('mainContent');
  content.style.padding = '0';
  content.style.overflow = 'hidden';
  content.innerHTML = buildCallHTML();

  addLocalTile();

  // Re-attach remote streams from existing peer connections
  Object.entries(peerConnections).forEach(([peerId, pc]) => {
    const rs = new MediaStream();
    pc.getReceivers().forEach(r => { if (r.track) rs.addTrack(r.track); });
    if (rs.getTracks().length) updateRemoteVideo(peerId, rs);
  });

  renderParticipants();
  initDraggablePanel();

  const btnMic = document.getElementById('btnMic');
  if (btnMic) btnMic.className = `call-panel-btn${micOn?'':' off'}`;
  const btnCam = document.getElementById('btnCam');
  if (btnCam) btnCam.className = `call-panel-btn${camOn?'':' off'}`;

  clearInterval(durationInterval);
  durationInterval = setInterval(() => {
    const s = Math.floor((Date.now()-callStartTime)/1000);
    const el = document.getElementById('callDuration');
    if (el) el.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }, 1000);

  setMeetingCleanup();
}

function buildCallHTML() {
  return `
    <div id="callWrap">
      <div id="videoArea">
        <div class="video-grid solo" id="videoGrid"></div>
        <div class="call-ctrl-panel" id="callCtrlPanel">
          <div id="panelGrip" class="panel-grip" title="Drag to move">
            <svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor">
              <circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/>
              <circle cx="3" cy="7" r="1.5"/><circle cx="7" cy="7" r="1.5"/>
              <circle cx="3" cy="11" r="1.5"/><circle cx="7" cy="11" r="1.5"/>
            </svg>
          </div>
          <div class="call-sep"></div>
          <button class="call-panel-btn" id="btnMic" onclick="toggleMic()" title="Mic (M)">
            <svg class="icon icon-18"><use href="#ic-mic"/></svg>
          </button>
          <button class="call-panel-btn" id="btnCam" onclick="toggleCam()" title="Camera (C)">
            <svg class="icon icon-18"><use href="#ic-cam"/></svg>
          </button>
          <button class="call-panel-btn" id="btnScreen" onclick="toggleScreen()" title="Screen share">
            <svg class="icon icon-18"><use href="#ic-screen"/></svg>
          </button>
          <div class="call-sep"></div>
          <button class="call-panel-btn panel-active" id="btnParticipants" onclick="switchSidebarTab('people')" title="Participants">
            <svg class="icon icon-18"><use href="#ic-users"/></svg>
          </button>
          <button class="call-panel-btn" id="btnChat" onclick="switchSidebarTab('chat')" title="Meeting chat">
            <svg class="icon icon-18"><use href="#ic-messages"/></svg>
          </button>
          <button class="call-panel-btn" id="btnWhiteboard" onclick="goToWhiteboard()" title="Whiteboard">
            <svg class="icon icon-18"><use href="#ic-whiteboard"/></svg>
          </button>
          <div class="call-sep"></div>
          <button class="call-panel-btn leave" onclick="leaveMeeting()" title="Leave (Esc)">
            <svg class="icon icon-18"><use href="#ic-logout"/></svg>
          </button>
          <div class="call-sep"></div>
          <button class="panel-meta-btn" id="btnOrient" onclick="togglePanelOrientation()"></button>
          <button class="panel-meta-btn" onclick="hidePanelControls()" title="Hide controls (H)">
            <svg class="icon icon-12"><use href="#ic-x"/></svg>
          </button>
        </div>
        <button class="call-ctrl-reveal" id="callCtrlReveal" onclick="showPanelControls()" title="Show controls (H)">
          <svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor">
            <circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/>
            <circle cx="3" cy="7" r="1.5"/><circle cx="7" cy="7" r="1.5"/>
            <circle cx="3" cy="11" r="1.5"/><circle cx="7" cy="11" r="1.5"/>
          </svg>
        </button>
      </div>
      <div class="call-sidebar" id="callSidebar">
        <div class="call-sidebar-tabs">
          <div class="call-sidebar-tab active" id="tabPeople" onclick="switchSidebarTab('people')">People</div>
          <div class="call-sidebar-tab" id="tabChat" onclick="switchSidebarTab('chat')">Chat</div>
        </div>
        <div class="call-sidebar-pane active" id="panepeople" style="overflow-y:auto;">
          <div id="participantList"></div>
        </div>
        <div class="call-sidebar-pane" id="panechat">
          <div class="call-chat-msgs" id="chatMsgs"></div>
          <div class="call-chat-compose">
            <textarea class="call-chat-input" id="chatInput" rows="1" placeholder="Message…"></textarea>
            <button class="call-chat-send" onclick="sendChatMsg()">
              <svg class="icon icon-14"><use href="#ic-send"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

window.switchSidebarTab = switchSidebarTab;
window.goToWhiteboard   = goToWhiteboard;
window.sendChatMsg      = sendChatMsg;

function setMeetingCleanup() {
  window.__cleanup = function() {
    if (_panelDragCleanup) { _panelDragCleanup(); _panelDragCleanup = null; }
    if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
    if (screenStream) { screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
    Object.values(peerConnections).forEach(pc=>pc.close());
    peerConnections={}; peerNames={};
    clearInterval(durationInterval);
    currentMeeting=null;
    if (socket) { socket.disconnect(); socket=null; }
    window.__meetingState = null;
  };
}

// ── Boot ───────────────────────────────────────────────────────────────────────
async function boot() {
  // Restore meeting state if we navigated away while in a call (PiP was active)
  if (window.__meetingState) {
    var s = window.__meetingState;
    window.__meetingState = null;
    me = s.me; meetings = s.meetings || []; iceServers = s.iceServers || [];
    socket = s.socket; localStream = s.localStream; screenStream = s.screenStream;
    peerConnections = s.peerConnections || {}; peerNames = s.peerNames || {};
    currentMeeting = s.currentMeeting; callStartTime = s.callStartTime;
    durationInterval = s.durationInterval; micOn = s.micOn; camOn = s.camOn; screenOn = s.screenOn;
    rejoinCallUI();
    setInterval(refreshMeetings, 8000);
    return;
  }

  me = await fetch('/api/auth/me').then(r=>r.json()).catch(()=>null);
  if (!me||me.error) { location.href='/login'; return; }
  const [iceResp, mtgResp] = await Promise.all([
    fetch('/api/meetings/ice-config').then(r=>r.json()).catch(()=>({ice_servers:[]})),
    fetch('/api/meetings').then(r=>r.json()).catch(()=>[]),
  ]);
  iceServers = iceResp.ice_servers||[];
  meetings   = mtgResp;
  renderLobby();
  initSocket();
  setInterval(refreshMeetings, 8000);
  setMeetingCleanup();
}

document.addEventListener('keydown', e => {
  if (!currentMeeting) return;
  if (e.target && e.target.id === 'chatInput') {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
    return;
  }
  if (e.key==='m') toggleMic();
  if (e.key==='c') toggleCam();
  if (e.key==='h') {
    const panel = document.getElementById('callCtrlPanel');
    if (panel) { if (panel.style.display==='none') showPanelControls(); else hidePanelControls(); }
  }
  if (e.key==='Escape') leaveMeeting();
});

boot();
</script>
