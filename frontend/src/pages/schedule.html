<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armu — Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--g1:#3dd68c;--g2:#38bdf8;--g3:#6ee7b7;--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);--radius:14px;--radius-sm:8px;--sidebar-w:220px;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
  [data-theme="dark"]{--bg:#111111;--bg2:#1a1a1a;--bg3:#222222;--bg4:#2c2c2c;--border:rgba(255,255,255,0.08);--border-accent:rgba(61,214,140,0.2);--text:#f0f0f0;--text2:#888888;--text3:#444444;--card:#1a1a1a;--shadow:0 4px 24px rgba(0,0,0,0.5);}
  [data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f7;--bg4:#e4e8f2;--border:rgba(0,0,0,0.07);--border-accent:rgba(61,214,140,0.3);--text:#111827;--text2:#4b5563;--text3:#9ca3af;--card:#ffffff;--shadow:0 4px 24px rgba(0,0,0,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;transition:background var(--transition),color var(--transition);}
  .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  .logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-top:2px;}
  .nav-section{padding:0 12px;margin-bottom:8px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13.5px;font-weight:400;color:var(--text2);border:1px solid transparent;margin-bottom:2px;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:linear-gradient(135deg,rgba(61,214,140,0.12),rgba(56,189,248,0.12));border-color:var(--border-accent);color:var(--text);}
  .nav-item.active .nav-icon{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}.nav-icon svg{width:16px;height:16px;}
  .sidebar-bottom{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);text-decoration:none;}
  .user-card:hover{background:var(--bg3);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-class{font-size:11px;color:var(--text3);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;flex-shrink:0;}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text2);}
  .icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border-accent);}
  .content{flex:1;overflow-y:auto;padding:28px;}
  .content::-webkit-scrollbar{width:4px;}
  .content::-webkit-scrollbar-track{background:transparent;}
  .content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  /* Schedule grid */
  .sched-cell{padding:10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:68px;position:relative;transition:background var(--transition);}
  .sched-cell:last-child{border-right:none;}
  .sched-cell.today-col{background:linear-gradient(135deg,rgba(61,214,140,0.05),rgba(56,189,248,0.05));}
  .sched-cell.today-col.current-period{background:linear-gradient(135deg,rgba(61,214,140,0.13),rgba(56,189,248,0.10));border-left:2px solid var(--g1);}
  .sched-subject{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sched-room{font-size:10px;color:var(--text3);margin-top:2px;}
  .sched-time-col{padding:10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;justify-content:center;}
  .sched-period-num{font-size:11px;font-weight:700;color:var(--text2);font-family:'DM Mono',monospace;}
  .sched-period-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
  .sched-day-header{padding:12px 10px;font-size:12px;font-weight:600;color:var(--text2);text-align:center;border-right:1px solid var(--border);}
  .sched-day-header:last-child{border-right:none;}
  .sched-day-header.today{color:var(--g1);background:linear-gradient(135deg,rgba(61,214,140,0.08),rgba(56,189,248,0.08));}
  .sched-subject-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0;vertical-align:middle;margin-bottom:1px;}
  svg.icon{color:inherit;display:inline-block;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
  .icon-14{width:14px;height:14px;}.icon-18{width:18px;height:18px;}.icon-20{width:20px;height:20px;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:slideIn 0.25s ease;}
</style>
</head>
<body>

  <div class="content">

    <!-- Day progress bar -->
    <div style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:13px;font-weight:600;color:var(--text);" id="sched-today-label">Loading…</div>
        <div style="font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;" id="sched-time-label">--:--</div>
      </div>
      <div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;">
        <div id="sched-progress-bar" style="height:100%;width:0%;background:var(--gradient);border-radius:3px;transition:width 1s linear;"></div>

        <div style="font-size:10px;color:var(--text3);">8:00</div>
        <div style="font-size:10px;color:var(--text3);" id="sched-progress-pct">0% through school day</div>

    <!-- Schedule grid -->
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <div style="overflow-x:auto;">
        <div style="min-width:560px;">
          <div id="sched-header" style="display:grid;grid-template-columns:80px repeat(5,1fr);background:var(--bg3);border-bottom:1px solid var(--border);"></div>

<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if(btn) btn.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon');
}

const SCHED_PERIODS = [
  { num:1,       label:'P1',    time:'8:00 – 8:50',   start:'8:00',  end:'8:50'  },
  { num:2,       label:'P2',    time:'8:55 – 9:45',   start:'8:55',  end:'9:45'  },
  { num:3,       label:'P3',    time:'9:50 – 10:40',  start:'9:50',  end:'10:40' },
  { num:'lunch', label:'🍽',   time:'10:40 – 11:10', start:'10:40', end:'11:10' },
  { num:4,       label:'P4',    time:'11:10 – 12:00', start:'11:10', end:'12:00' },
  { num:5,       label:'P5',    time:'12:05 – 12:55', start:'12:05', end:'12:55' },
  { num:6,       label:'P6',    time:'13:00 – 13:50', start:'13:00', end:'13:50' },
  { num:7,       label:'P7',    time:'13:55 – 14:45', start:'13:55', end:'14:45' },
  { num:8,       label:'P8',    time:'14:50 – 15:30', start:'14:50', end:'15:30' },
];

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

const SUBJECT_COLORS = [
  '#3dd68c','#38bdf8','#a78bfa','#fbbf24','#f87171','#fb923c','#34d399','#e879f9','#60a5fa','#4ade80'
];

function timeToMins(t) {
  const parts = t.split(':').map(Number);
  return parts[0] * 60 + parts[1];
}

let schedTimer = null;

function renderSchedule(apiData) {
  const now = new Date();
  const todayIndex = now.getDay() - 1; // 0=Mon…4=Fri, -1=Sun, 5=Sat
  const isWeekday = todayIndex >= 0 && todayIndex <= 4;
  const nowMins = now.getHours() * 60 + now.getMinutes();

  // Build lookup: schedMap[dayIndex][periodNum] = { subject_name, ... }
  const schedMap = {};
  (apiData || []).forEach(p => {
    if (!schedMap[p.day_of_week]) schedMap[p.day_of_week] = {};
    schedMap[p.day_of_week][p.period_number] = p;
  });

  // Assign consistent colors to subject names
  const colorMap = {};
  let colorIdx = 0;
  (apiData || []).forEach(p => {
    if (p.subject_name && !colorMap[p.subject_name]) {
      colorMap[p.subject_name] = SUBJECT_COLORS[colorIdx++ % SUBJECT_COLORS.length];
    }
  });

  // Header
  const header = document.getElementById('sched-header');
  header.innerHTML = `<div style="padding:12px 10px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;border-right:1px solid var(--border);">Period</div>`;
  DAYS.forEach((day, i) => {
    const isToday = i === todayIndex;
    header.innerHTML += `<div class="sched-day-header${isToday ? ' today' : ''}">${day}${isToday ? ' 📍' : ''}</div>`;
  });

  // Body
  const body = document.getElementById('sched-body');
  body.innerHTML = '';

  SCHED_PERIODS.forEach(period => {
    const row = document.createElement('div');
    row.style.cssText = 'display:grid;grid-template-columns:80px repeat(5,1fr);';

    const pStart = timeToMins(period.start);
    const pEnd   = timeToMins(period.end);
    const isCurPeriod = isWeekday && nowMins >= pStart && nowMins < pEnd;

    // Time cell
    const tc = document.createElement('div');
    tc.className = 'sched-time-col';
    tc.innerHTML = period.num === 'lunch'
      ? `<div class="sched-period-num">${period.label}</div><div class="sched-period-time">${period.time}</div>`
      : `<div class="sched-period-num">${period.label}</div><div class="sched-period-time">${period.time}</div>`;
    if (isCurPeriod) {
      tc.style.background = 'linear-gradient(135deg,rgba(61,214,140,0.12),rgba(56,189,248,0.08))';
      tc.querySelector('.sched-period-num').style.color = 'var(--g1)';
    }
    row.appendChild(tc);

    DAYS.forEach((_, di) => {
      const cell = document.createElement('div');
      const isToday = di === todayIndex;
      const isCur   = isToday && isCurPeriod;
      cell.className = `sched-cell${isToday ? ' today-col' : ''}${isCur ? ' current-period' : ''}`;

      if (period.num === 'lunch') {
        cell.style.cssText = `display:flex;align-items:center;padding:10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);${isToday ? 'background:rgba(61,214,140,0.04);' : 'background:var(--bg3);'}`;
        cell.innerHTML = `<div style="font-size:11px;color:var(--text3);">${isToday ? '🍽 Lunch Break' : 'Lunch'}</div>`;
        row.appendChild(cell);
        return;
      }

      const info = schedMap[di]?.[period.num];
      if (info && info.subject_name) {
        const col = colorMap[info.subject_name] || 'var(--g1)';
        cell.innerHTML = `
          <div class="sched-subject"><span class="sched-subject-dot" style="background:${col}"></span>${info.subject_name}</div>
          ${isCur ? `<div style="font-size:9px;font-weight:700;margin-top:3px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">● NOW</div>` : ''}
        `;
      } else {
        cell.innerHTML = `<div style="font-size:11px;color:var(--text3);">—</div>`;
      }
      row.appendChild(cell);
    });

    body.appendChild(row);
  });

  // Progress bar labels
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dl = document.getElementById('sched-today-label');
  const tl = document.getElementById('sched-time-label');
  if (dl) dl.textContent = `${dayNames[now.getDay()]}, ${monNames[now.getMonth()]} ${now.getDate()}`;
  if (tl) tl.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const schoolStart = 480, schoolEnd = 930; // 8:00–15:30
  const bar = document.getElementById('sched-progress-bar');
  const pctLabel = document.getElementById('sched-progress-pct');
  if (!bar || !pctLabel) return;
  if (!isWeekday) { bar.style.width = '0%'; pctLabel.textContent = 'No school today'; return; }
  if (nowMins < schoolStart) { bar.style.width = '0%'; pctLabel.textContent = "School hasn't started yet"; return; }
  if (nowMins >= schoolEnd)  { bar.style.width = '100%'; pctLabel.textContent = 'School day complete ✓'; return; }
  const pct = Math.round(((nowMins - schoolStart) / (schoolEnd - schoolStart)) * 100);
  bar.style.width = pct + '%';
  pctLabel.textContent = `${pct}% through school day`;
}

async function boot() {
  // Auth check
  const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
  if (!me || me.error) { location.href = '/login'; return; }

  document.getElementById('userName').textContent = me.name || me.email;
  const initials = (me.name || me.email).split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  if (me.class_name) document.getElementById('userClass').textContent = me.class_name + (me.school_name ? ' · ' + me.school_name : '');

  const apiData = await fetch('/api/schedule').then(r => r.json()).catch(() => []);

  renderSchedule(apiData);

  if (schedTimer) clearInterval(schedTimer);
  schedTimer = setInterval(() => renderSchedule(apiData), 30000);
}

boot();
</script>
<script src="/static/notif.js"></script>
<script src="/static/pjax.js"></script>
</body>
</html>
