<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armu — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--g1:#3dd68c;--g2:#38bdf8;--g3:#6ee7b7;--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);--radius:14px;--radius-sm:8px;--sidebar-w:220px;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
  [data-theme="dark"]{--bg:#111111;--bg2:#1a1a1a;--bg3:#222222;--bg4:#2c2c2c;--border:rgba(255,255,255,0.08);--border-accent:rgba(var(--g1-rgb),0.2);--text:#f0f0f0;--text2:#888888;--text3:#444444;--card:#1a1a1a;--shadow:0 4px 24px rgba(0,0,0,0.5);}
  [data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f7;--bg4:#e4e8f2;--border:rgba(0,0,0,0.07);--border-accent:rgba(var(--g1-rgb),0.3);--text:#111827;--text2:#4b5563;--text3:#9ca3af;--card:#ffffff;--shadow:0 4px 24px rgba(0,0,0,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;transition:background var(--transition),color var(--transition);}
  .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  #sidebarNav{display:contents;}
  .logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-top:2px;}
  .nav-section{padding:0 12px;margin-bottom:8px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13.5px;color:var(--text2);border:1px solid transparent;margin-bottom:2px;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.12),rgba(var(--g2-rgb),0.12));border-color:var(--border-accent);color:var(--text);}
  .nav-item.active .nav-icon{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-bottom{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);text-decoration:none;}
  .user-card:hover{background:var(--bg3);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
  .avatar-sm{width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-class{font-size:11px;color:var(--text3);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;flex-shrink:0;}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text2);}
  .icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border-accent);}
  svg.icon{color:inherit;display:inline-block;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
  .icon-14{width:14px;height:14px;}.icon-18{width:18px;height:18px;}.icon-20{width:20px;height:20px;}

  /* Messages layout */
  .msg-body{flex:1;display:flex;overflow:hidden;}

  /* Conversation list panel */
  .conv-panel{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .conv-panel-head{padding:16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;}
  .conv-list{flex:1;overflow-y:auto;}
  .conv-list::-webkit-scrollbar{width:4px;}
  .conv-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background var(--transition);border-bottom:1px solid var(--border);}
  .conv-item:hover{background:var(--bg3);}
  .conv-item.active{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.08),rgba(var(--g2-rgb),0.08));border-left:2px solid var(--g1);}
  .conv-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .conv-time{font-size:10px;color:var(--text3);flex-shrink:0;margin-left:auto;align-self:flex-start;padding-top:2px;}
  .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--g1);flex-shrink:0;}

  /* Thread panel */
  .thread-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .thread-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0;}
  .thread-head-name{font-size:14px;font-weight:600;}
  .thread-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
  .thread-msgs::-webkit-scrollbar{width:4px;}
  .thread-msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .msg-bubble{max-width:68%;display:flex;flex-direction:column;gap:3px;}
  .msg-bubble.mine{align-self:flex-end;align-items:flex-end;}
  .msg-bubble.theirs{align-self:flex-start;align-items:flex-start;}
  .bubble-text{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.45;word-break:break-word;}
  .mine .bubble-text{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.18),rgba(var(--g2-rgb),0.18));border:1px solid var(--border-accent);color:var(--text);}
  .theirs .bubble-text{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
  .bubble-time{font-size:10px;color:var(--text3);padding:0 4px;}
  .thread-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;}
  .thread-compose{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--bg2);flex-shrink:0;}
  .compose-input{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color var(--transition);resize:none;height:40px;line-height:20px;}
  .compose-input:focus{border-color:var(--border-accent);}
  .compose-input::placeholder{color:var(--text3);}
  .send-btn{padding:0 18px;height:40px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--g1),var(--g2));border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity var(--transition);white-space:nowrap;}
  .send-btn:hover{opacity:0.85;}
  .send-btn:disabled{opacity:0.4;cursor:default;}

  /* Empty state */
  .no-conv{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text3);}
  .no-conv svg{width:40px;height:40px;opacity:0.3;}
</style>

<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if(btn) btn.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon');
}

let myId = null;
let conversations = [];  // [{otherId, otherName, messages:[]}]
let activeIdx = -1;

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function buildConversations(messages) {
  const map = {};
  for (const m of messages) {
    const otherId   = m.sender_id === myId ? m.recipient_id : m.sender_id;
    const otherName = m.sender_id === myId ? (m.recipient_name || 'User #' + otherId) : (m.sender_name || 'User #' + otherId);
    if (!map[otherId]) map[otherId] = {otherId, otherName, messages: []};
    map[otherId].messages.push(m);
    if (!map[otherId].otherName || map[otherId].otherName.startsWith('User #')) {
      map[otherId].otherName = otherName;
    }
  }
  // sort each thread oldest→newest
  for (const c of Object.values(map)) {
    c.messages.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  }
  // sort conversations by latest message
  return Object.values(map).sort((a,b) => {
    const aLast = a.messages[a.messages.length-1]?.created_at || '';
    const bLast = b.messages[b.messages.length-1]?.created_at || '';
    return bLast.localeCompare(aLast);
  });
}

function renderConvList() {
  const el = document.getElementById('convList');
  if (!conversations.length) {
    el.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--text3);font-size:13px;">No messages yet.</div>';
    return;
  }
  el.innerHTML = conversations.map((c, i) => {
    const last = c.messages[c.messages.length - 1];
    const preview = last ? (last.sender_id === myId ? 'You: ' : '') + last.content : '';
    const unread = c.messages.some(m => m.sender_id !== myId && !m.is_read);
    return `<div class="conv-item${i === activeIdx ? ' active' : ''}" onclick="openConv(${i})">
      <div class="avatar-sm">${initials(c.otherName)}</div>
      <div style="flex:1;min-width:0;">
        <div class="conv-name">${c.otherName}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="conv-time">${fmtTime(last?.created_at)}</div>
        ${unread ? '<div class="unread-dot"></div>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderThread(conv) {
  const panel = document.getElementById('threadPanel');
  panel.innerHTML = `
    <div class="thread-head">
      <div class="avatar-sm">${initials(conv.otherName)}</div>
      <div class="thread-head-name">${conv.otherName}</div>
    </div>
    <div class="thread-msgs" id="threadMsgs">
      ${conv.messages.length === 0
        ? '<div class="thread-empty">No messages yet. Say hello!</div>'
        : conv.messages.map(m => {
            const mine = m.sender_id === myId;
            return `<div class="msg-bubble ${mine ? 'mine' : 'theirs'}">
              <div class="bubble-text">${m.content}</div>
              <div class="bubble-time">${fmtTime(m.created_at)}</div>
            </div>`;
          }).join('')
      }
    </div>
    <div class="thread-compose">
      <textarea class="compose-input" id="composeInput" placeholder="Type a message…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg class="icon icon-18"><use href="#ic-send"/></svg>
      </button>
    </div>`;

  const msgs = document.getElementById('threadMsgs');
  msgs.scrollTop = msgs.scrollHeight;

  const input = document.getElementById('composeInput');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
}

function openConv(i) {
  activeIdx = i;
  renderConvList();
  renderThread(conversations[i]);
}

async function sendMsg() {
  if (activeIdx < 0) return;
  const input = document.getElementById('composeInput');
  const content = input.value.trim();
  if (!content) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';

  const conv = conversations[activeIdx];
  const res = await fetch('/api/messages/personal', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({recipient_id: conv.otherId, content}),
  }).then(r => r.json()).catch(() => null);

  btn.disabled = false;

  if (res && !res.error) {
    conv.messages.push(res);
    // Move conversation to top
    conversations.splice(activeIdx, 1);
    conversations.unshift(conv);
    activeIdx = 0;
    renderConvList();
    renderThread(conv);
  }
}

async function boot() {
  const [me, messages] = await Promise.all([
    fetch('/api/auth/me').then(r => r.json()).catch(() => null),
    fetch('/api/messages/personal').then(r => r.json()).catch(() => []),
  ]);

  if (!me || me.error) { location.href = '/login'; return; }

  if (me.role === 'teacher')        applyTeacherNav('/messages');
  else if (me.role === 'admin')     applyAdminNav();
  else if (me.role === 'librarian') applyLibrarianNav('/messages');

  myId = me.id;
  document.getElementById('userName').textContent = me.name || me.email;
  document.getElementById('userAvatar').textContent =
    (me.name || me.email).split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userClass').textContent = me.class_name
    ? me.class_name + (me.school_name ? ' · ' + me.school_name : '')
    : me.role ? me.role.charAt(0).toUpperCase() + me.role.slice(1) : '';

  conversations = buildConversations(Array.isArray(messages) ? messages : []);
  renderConvList();
}

boot();
