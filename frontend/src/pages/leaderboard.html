<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MokyAI — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--g1:#3dd68c;--g2:#38bdf8;--g3:#6ee7b7;--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);--radius:14px;--radius-sm:8px;--sidebar-w:220px;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
  [data-theme="dark"]{--bg:#111111;--bg2:#1a1a1a;--bg3:#222222;--bg4:#2c2c2c;--border:rgba(255,255,255,0.08);--border-accent:rgba(61,214,140,0.2);--text:#f0f0f0;--text2:#888888;--text3:#444444;--card:#1a1a1a;--shadow:0 4px 24px rgba(0,0,0,0.5);}
  [data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f7;--bg4:#e4e8f2;--border:rgba(0,0,0,0.07);--border-accent:rgba(61,214,140,0.3);--text:#111827;--text2:#4b5563;--text3:#9ca3af;--card:#ffffff;--shadow:0 4px 24px rgba(0,0,0,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;transition:background var(--transition),color var(--transition);}
  .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  .logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-top:2px;}
  .nav-section{padding:0 12px;margin-bottom:8px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13.5px;font-weight:400;color:var(--text2);border:1px solid transparent;margin-bottom:2px;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:linear-gradient(135deg,rgba(61,214,140,0.12),rgba(56,189,248,0.12));border-color:var(--border-accent);color:var(--text);}
  .nav-item.active .nav-icon{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}.nav-icon svg{width:16px;height:16px;}
  .sidebar-bottom{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);text-decoration:none;}
  .user-card:hover{background:var(--bg3);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-class{font-size:11px;color:var(--text3);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;flex-shrink:0;}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text2);}
  .icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border-accent);}
  .content{flex:1;overflow-y:auto;padding:28px;}
  .content::-webkit-scrollbar{width:4px;}
  .content::-webkit-scrollbar-track{background:transparent;}
  .content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
  .mode-btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;gap:6px;}
  .mode-btn:hover{background:var(--bg4);color:var(--text);}
  .mode-btn.active{background:linear-gradient(135deg,rgba(61,214,140,0.12),rgba(56,189,248,0.12));border-color:var(--border-accent);color:var(--text);}
  .lb-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;transition:all var(--transition);}
  .lb-item:hover{border-color:var(--border-accent);}
  .lb-item.me{border-color:var(--border-accent);background:linear-gradient(135deg,rgba(61,214,140,0.06),rgba(56,189,248,0.06));}
  .rank{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text3);width:24px;text-align:center;}
  .rank.gold{color:#fbbf24;}
  .rank.silver{color:#94a3b8;}
  .rank.bronze{color:#b45309;}
  .lb-score{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .lb-score.negative{background:none;-webkit-text-fill-color:#f87171;color:#f87171;}
  .podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px;}
  .podium-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center;position:relative;}
  .podium-card.first{border-color:rgba(251,191,36,0.35);background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(251,191,36,0.02));}
  .podium-card.second{border-color:rgba(148,163,184,0.3);background:linear-gradient(135deg,rgba(148,163,184,0.07),rgba(148,163,184,0.01));}
  .podium-card.third{border-color:rgba(180,83,9,0.3);background:linear-gradient(135deg,rgba(180,83,9,0.08),rgba(180,83,9,0.01));}
  .podium-medal{font-size:28px;margin-bottom:8px;}
  .podium-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;margin:0 auto 10px;}
  .podium-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .podium-score{font-size:20px;font-weight:700;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  svg.icon{color:inherit;display:inline-block;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
  .icon-14{width:14px;height:14px;}.icon-18{width:18px;height:18px;}.icon-20{width:20px;height:20px;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:slideIn 0.25s ease;}
</style>
</head>
<body>

<div class="main">
  <div class="topbar">
    <svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-leaderboard"/></svg>
    <span class="topbar-title">Leaderboard 🔥</span>
    <div class="topbar-right">
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <svg class="icon icon-18"><use href="#ic-moon"/></svg>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- Header -->
    <div class="section-header" style="margin-bottom:6px;">
      <div class="section-title" id="lb-subtitle">Class — Current Semester</div>
    </div>
    <div style="height:2px;background:var(--gradient);border-radius:2px;margin-bottom:20px;"></div>

    <!-- Tab bar -->
    <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px;flex-wrap:wrap;">
      <button class="mode-btn active" id="tab-btn-streaks"  onclick="switchTab('streaks')"><svg class="icon icon-14"><use href="#ic-streak"/></svg> Streaks</button>
      <button class="mode-btn"        id="tab-btn-ontime"   onclick="switchTab('ontime')"><svg class="icon icon-14"><use href="#ic-check"/></svg> On-time</button>
      <button class="mode-btn"        id="tab-btn-helpful"  onclick="switchTab('helpful')"><svg class="icon icon-14"><use href="#ic-messages"/></svg> Helpful</button>
      <button class="mode-btn"        id="tab-btn-conduct"  onclick="switchTab('conduct')"><svg class="icon icon-14"><use href="#ic-conduct"/></svg> Conduct</button>
    </div>

    <!-- Podium (top 3) -->
    <div class="podium" id="lb-podium"></div>

    <!-- Full ranked list -->
    <div id="lb-list"></div>

  </div>
</div>

<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if(btn) btn.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon');
}

const TAB_ICON  = { streaks:'#ic-streak', ontime:'#ic-check', helpful:'#ic-messages', conduct:'#ic-conduct' };
const TAB_LABEL = { streaks:'grades submitted', ontime:'avg score', helpful:'messages sent', conduct:'conduct pts' };
const RANK_CLASS  = ['gold','silver','bronze'];
const MEDAL       = ['🥇','🥈','🥉'];
const PODIUM_BG   = [
  ['rgba(251,191,36,0.08)','rgba(251,191,36,0.35)'],
  ['rgba(148,163,184,0.07)','rgba(148,163,184,0.3)'],
  ['rgba(180,83,9,0.08)','rgba(180,83,9,0.3)'],
];

// Avatar gradient palette — cycles for each student by index
const AVATAR_GRADIENTS = [
  'var(--gradient)',
  'linear-gradient(135deg,#8b5cf6,#7c3aed)',
  'linear-gradient(135deg,#ec4899,#db2777)',
  'linear-gradient(135deg,#fb923c,#f59e0b)',
  'linear-gradient(135deg,#34d399,#0ea5e9)',
  'linear-gradient(135deg,#64748b,#475569)',
];

let lbData = { streaks:[], ontime:[], helpful:[], conduct:[] };
let currentTab = 'streaks';

function avatarGrad(id) {
  return AVATAR_GRADIENTS[id % AVATAR_GRADIENTS.length];
}

function scoreStr(e) {
  return `${e.prefix || ''}${Math.abs(e.score)}${e.suffix || ''}`;
}

function switchTab(tab) {
  currentTab = tab;
  ['streaks','ontime','helpful','conduct'].forEach(t =>
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab)
  );
  renderTab();
}

function renderTab() {
  const data   = lbData[currentTab] || [];
  const icon   = TAB_ICON[currentTab];
  const sublbl = TAB_LABEL[currentTab];

  if (!data.length) {
    document.getElementById('lb-podium').innerHTML = '';
    document.getElementById('lb-list').innerHTML =
      `<div style="text-align:center;padding:48px;color:var(--text3);font-size:14px;">No classmates yet — add more students to your class to see the leaderboard.</div>`;
    return;
  }

  // Podium
  const podiumEl = document.getElementById('lb-podium');
  podiumEl.style.display = data.length >= 3 ? 'grid' : 'none';
  if (data.length >= 3) {
    podiumEl.innerHTML = data.slice(0,3).map((e, i) => `
      <div class="podium-card ${['first','second','third'][i]}"
        style="background:${PODIUM_BG[i][0]};border-color:${PODIUM_BG[i][1]};">
        <div class="podium-medal">${MEDAL[i]}</div>
        <div class="podium-avatar" style="background:${avatarGrad(e.id)};">${e.initials}</div>
        <div class="podium-name">${e.name}</div>
        <div class="podium-score">${scoreStr(e)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;">${sublbl}</div>
      </div>`).join('');
  }

  // Full ranked list
  document.getElementById('lb-list').innerHTML = data.map((e, i) => {
    const neg = !!e.negative;
    return `<div class="lb-item${e.me ? ' me' : ''}">
      <div class="rank ${RANK_CLASS[i] || ''}">${i + 1}</div>
      <div class="avatar" style="background:${avatarGrad(e.id)};font-size:12px;">${e.initials}</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:500;color:var(--text);">
          ${e.name}${e.me ? ' <span style="font-size:11px;color:var(--g2);">← You</span>' : ''}
        </div>
      </div>
      <div class="lb-score${neg ? ' negative' : ''}">
        <svg class="icon icon-14"><use href="${icon}"/></svg>
        <span>${scoreStr(e)}</span>
      </div>
    </div>`;
  }).join('');
}

async function boot() {
  const [me, lb] = await Promise.all([
    fetch('/api/auth/me').then(r => r.json()).catch(() => null),
    fetch('/api/leaderboard').then(r => r.json()).catch(() => null),
  ]);

  if (!me || me.error) { location.href = '/login'; return; }

  document.getElementById('userName').textContent = me.name || me.email;
  document.getElementById('userAvatar').textContent =
    (me.name || me.email).split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

  const classInfo = me.class_name
    ? me.class_name + (me.school_name ? ' · ' + me.school_name : '')
    : '';
  if (classInfo) {
    document.getElementById('userClass').textContent = classInfo;
    document.getElementById('lb-subtitle').textContent =
      classInfo + ' · ' + new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'});
  }

  if (lb) lbData = lb;
  renderTab();
}

boot();
</script>
<script src="/static/notif.js"></script>
</body>
</html>
