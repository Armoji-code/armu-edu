<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armu — Loans</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root{--g1:#3dd68c;--g2:#38bdf8;--g3:#6ee7b7;--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);--radius:14px;--radius-sm:8px;--sidebar-w:220px;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
  [data-theme="dark"]{--bg:#111111;--bg2:#1a1a1a;--bg3:#222222;--bg4:#2c2c2c;--border:rgba(255,255,255,0.08);--border-accent:rgba(var(--g1-rgb),0.2);--text:#f0f0f0;--text2:#888888;--text3:#444444;}
  [data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f7;--bg4:#e4e8f2;--border:rgba(0,0,0,0.07);--border-accent:rgba(var(--g1-rgb),0.3);--text:#111827;--text2:#4b5563;--text3:#9ca3af;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  .logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-top:2px;}
  .nav-section{padding:0 12px;margin-bottom:8px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13.5px;color:var(--text2);border:1px solid transparent;margin-bottom:2px;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.12),rgba(var(--g2-rgb),0.12));border-color:var(--border-accent);color:var(--text);}
  .nav-item.active .nav-icon{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-bottom{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);text-decoration:none;}
  .user-card:hover{background:var(--bg3);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;flex-shrink:0;}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text2);}
  .icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border-accent);}
  svg.icon{color:inherit;display:inline-block;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
  .icon-14{width:14px;height:14px;}.icon-18{width:18px;height:18px;}.icon-20{width:20px;height:20px;}

  .tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;}
  .tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);transition:all var(--transition);border:none;background:none;font-family:inherit;}
  .tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all var(--transition);}
  .btn-primary{background:linear-gradient(135deg,var(--g1),var(--g2));color:#000;}
  .btn-primary:hover{opacity:0.9;}
  .btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
  .btn-ghost:hover{background:var(--bg4);color:var(--text);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .btn-return{background:rgba(var(--g1-rgb),0.1);border:1px solid rgba(var(--g1-rgb),0.3);color:var(--g1);}
  .btn-return:hover{background:rgba(var(--g1-rgb),0.2);}

  .content{flex:1;overflow-y:auto;padding:20px 28px;}
  .content::-webkit-scrollbar{width:4px;}
  .content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  @keyframes slideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:slideIn 0.2s ease;}

  .loan-table{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .loan-row{display:grid;grid-template-columns:2fr 1.2fr 100px 100px 90px 80px;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;}
  .loan-row:last-child{border-bottom:none;}
  .loan-row.header{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;background:var(--bg3);}
  .loan-row:not(.header):hover{background:var(--bg3);}
  .empty{padding:48px;text-align:center;color:var(--text3);font-size:13px;}
  .badge{display:inline-flex;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;}
  .badge-active{background:rgba(var(--g2-rgb),0.12);color:#38bdf8;}
  .badge-overdue{background:rgba(248,113,113,0.12);color:#f87171;}
  .badge-returned{background:rgba(var(--g1-rgb),0.12);color:#3dd68c;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity var(--transition);}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:440px;max-width:94vw;}
  .modal-title{font-size:15px;font-weight:600;margin-bottom:18px;}
  .form-row{margin-bottom:14px;}
  .form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;display:block;}
  .form-input{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color var(--transition);}
  .form-input:focus{border-color:var(--border-accent);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
  .suggest-list{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:4px;max-height:160px;overflow-y:auto;display:none;}
  .suggest-list.open{display:block;}
  .suggest-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover{background:var(--bg4);}
  .suggest-sub{font-size:11px;color:var(--text3);}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none"><defs>
  <symbol id="ic-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></symbol>
  <symbol id="ic-books" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></symbol>
  <symbol id="ic-dashboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></symbol>
  <symbol id="ic-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></symbol>
  <symbol id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></symbol>
  <symbol id="ic-chevright" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></symbol>
  <symbol id="ic-messages" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></symbol>
  <symbol id="ic-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
</defs></svg>

<aside class="sidebar">
  <div class="logo"><div class="logo-text">Armu</div><div class="logo-sub">library panel</div></div>
  <div class="nav-section">
    <div class="nav-label">Library</div>
    <a class="nav-item" href="/librarian"><span class="nav-icon"><svg class="icon"><use href="#ic-dashboard"/></svg></span><span>Overview</span></a>
    <a class="nav-item" href="/librarian/books"><span class="nav-icon"><svg class="icon"><use href="#ic-book"/></svg></span><span>Books</span></a>
    <a class="nav-item active" href="/librarian/loans"><span class="nav-icon"><svg class="icon"><use href="#ic-list"/></svg></span><span>Loans</span></a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Other</div>
    <a class="nav-item" href="/messages"><span class="nav-icon"><svg class="icon"><use href="#ic-messages"/></svg></span><span>Messages</span></a>
    <a class="nav-item" href="/settings"><span class="nav-icon"><svg class="icon"><use href="#ic-settings"/></svg></span><span>Settings</span></a>
  </div>
  <div class="sidebar-bottom">
    <a class="user-card" href="/profile">
      <div class="avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="user-name" id="userName">Loading…</div><div style="font-size:11px;color:var(--text3);">Librarian</div></div>
      <svg class="icon icon-14" style="color:var(--text3);margin-left:auto;flex-shrink:0"><use href="#ic-chevright"/></svg>
    </a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-list"/></svg>
    <span class="topbar-title">Loans</span>
    <div class="tabs" id="filterTabs">
      <button class="tab active" onclick="setFilter('active',this)">Active</button>
      <button class="tab" onclick="setFilter('overdue',this)">Overdue</button>
      <button class="tab" onclick="setFilter('all',this)">All History</button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openCheckout()"><svg class="icon icon-14"><use href="#ic-plus"/></svg> Check Out</button>
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()"><svg class="icon icon-18"><use href="#ic-moon"/></svg></div>
    </div>
  </div>

  <div class="content">
    <div class="loan-table" id="loanTable">
      <div class="empty">Loading…</div>
    </div>
  </div>
</div>

<!-- Checkout modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Check Out Book</div>

    <div class="form-row">
      <label class="form-label">Book *</label>
      <input class="form-input" id="bookSearch" placeholder="Search title or author…" oninput="searchBooks(this.value)" autocomplete="off">
      <div class="suggest-list" id="bookSuggest"></div>
      <input type="hidden" id="selectedBookId">
      <div id="selectedBookLabel" style="font-size:12px;color:var(--g1);margin-top:4px;"></div>
    </div>

    <div class="form-row">
      <label class="form-label">Borrower *</label>
      <input class="form-input" id="memberSearch" placeholder="Search name or email…" oninput="searchMembers(this.value)" autocomplete="off">
      <div class="suggest-list" id="memberSuggest"></div>
      <input type="hidden" id="selectedUserId">
      <div id="selectedUserLabel" style="font-size:12px;color:var(--g1);margin-top:4px;"></div>
    </div>

    <div class="form-row">
      <label class="form-label">Due Date *</label>
      <input class="form-input" id="dueDate" type="date">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitCheckout()">
        <svg class="icon icon-14"><use href="#ic-check"/></svg> Check Out
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn')?.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function fmtDate(iso){ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

let currentFilter = 'active';

// Read ?status= from URL
(function(){
  const p = new URLSearchParams(location.search);
  if (p.get('status') === 'overdue') {
    currentFilter = 'overdue';
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === 1));
  }
})();

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadLoans();
}

function statusBadge(loan) {
  if (loan.returned_at) return '<span class="badge badge-returned">Returned</span>';
  if (loan.overdue)     return '<span class="badge badge-overdue">Overdue</span>';
  return '<span class="badge badge-active">Active</span>';
}

function renderLoans(loans) {
  const tbl = document.getElementById('loanTable');
  if (!loans.length) { tbl.innerHTML = '<div class="empty">No loans found.</div>'; return; }
  tbl.innerHTML = `
    <div class="loan-row header">
      <span>Book</span><span>Borrower</span><span>Checked Out</span><span>Due</span><span>Status</span><span></span>
    </div>
    ${loans.map(l => `
      <div class="loan-row">
        <span style="font-weight:500">${esc(l.book_title)}<br><span style="font-size:11px;color:var(--text3)">${esc(l.book_author)}</span></span>
        <span>${esc(l.user_name)}<br><span style="font-size:11px;color:var(--text3)">${esc(l.user_email)}</span></span>
        <span style="color:var(--text2)">${fmtDate(l.checked_out_at)}</span>
        <span style="color:var(--text2)">${fmtDate(l.due_date)}</span>
        <span>${statusBadge(l)}</span>
        <span>
          ${!l.returned_at ? `<button class="btn btn-sm btn-return" onclick="returnLoan(${l.id})">Return</button>` : ''}
        </span>
      </div>`).join('')}`;
}

async function loadLoans() {
  const loans = await fetch(`/api/librarian/loans?status=${currentFilter}`).then(r => r.json()).catch(() => []);
  renderLoans(loans);
}

async function returnLoan(id) {
  const res = await fetch(`/api/librarian/loans/${id}/return`, { method: 'POST' });
  if (!res.ok) { const e = await res.json().catch(()=>{}); alert(e?.error || 'Failed'); return; }
  loadLoans();
}

// ── Checkout modal ────────────────────────────────────────────────────────────

let bookTimer, memberTimer;

function openCheckout() {
  document.getElementById('bookSearch').value   = '';
  document.getElementById('memberSearch').value = '';
  document.getElementById('selectedBookId').value = '';
  document.getElementById('selectedUserId').value = '';
  document.getElementById('selectedBookLabel').textContent = '';
  document.getElementById('selectedUserLabel').textContent = '';
  document.getElementById('bookSuggest').classList.remove('open');
  document.getElementById('memberSuggest').classList.remove('open');
  // Default due date = 2 weeks from now
  const d = new Date(); d.setDate(d.getDate() + 14);
  document.getElementById('dueDate').value = d.toISOString().slice(0,10);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function searchBooks(q) {
  clearTimeout(bookTimer);
  if (!q.trim()) { document.getElementById('bookSuggest').classList.remove('open'); return; }
  bookTimer = setTimeout(async () => {
    const books = await fetch(`/api/librarian/books?q=${encodeURIComponent(q)}`).then(r => r.json()).catch(() => []);
    const list = document.getElementById('bookSuggest');
    if (!books.length) { list.classList.remove('open'); return; }
    list.innerHTML = books.map(b =>
      `<div class="suggest-item" onclick="selectBook(${b.id},'${esc(b.title)}',${b.available_copies})">
        <div>${esc(b.title)} — <span style="color:var(--text3)">${esc(b.author)}</span></div>
        <div class="suggest-sub">${b.available_copies} of ${b.total_copies} available</div>
      </div>`).join('');
    list.classList.add('open');
  }, 250);
}

function selectBook(id, title, avail) {
  document.getElementById('selectedBookId').value  = id;
  document.getElementById('bookSearch').value      = title;
  document.getElementById('bookSuggest').classList.remove('open');
  document.getElementById('selectedBookLabel').textContent = avail > 0 ? `✓ ${avail} cop${avail===1?'y':'ies'} available` : '⚠ No copies available';
  document.getElementById('selectedBookLabel').style.color = avail > 0 ? 'var(--g1)' : '#f87171';
}

function searchMembers(q) {
  clearTimeout(memberTimer);
  if (!q.trim()) { document.getElementById('memberSuggest').classList.remove('open'); return; }
  memberTimer = setTimeout(async () => {
    const members = await fetch(`/api/librarian/members?q=${encodeURIComponent(q)}`).then(r => r.json()).catch(() => []);
    const list = document.getElementById('memberSuggest');
    if (!members.length) { list.classList.remove('open'); return; }
    list.innerHTML = members.map(m =>
      `<div class="suggest-item" onclick="selectMember(${m.id},'${esc(m.name)}','${esc(m.email)}')">
        <div>${esc(m.name)}</div>
        <div class="suggest-sub">${esc(m.email)} · ${m.role}</div>
      </div>`).join('');
    list.classList.add('open');
  }, 250);
}

function selectMember(id, name, email) {
  document.getElementById('selectedUserId').value   = id;
  document.getElementById('memberSearch').value     = name;
  document.getElementById('memberSuggest').classList.remove('open');
  document.getElementById('selectedUserLabel').textContent = `✓ ${email}`;
}

async function submitCheckout() {
  const bookId  = document.getElementById('selectedBookId').value;
  const userId  = document.getElementById('selectedUserId').value;
  const dueDate = document.getElementById('dueDate').value;
  if (!bookId || !userId || !dueDate) { alert('Please select a book, borrower, and due date.'); return; }
  const res = await fetch('/api/librarian/loans', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ book_id: +bookId, user_id: +userId, due_date: dueDate }),
  });
  if (!res.ok) { const e = await res.json().catch(()=>{}); alert(e?.error || 'Checkout failed'); return; }
  closeModal();
  currentFilter = 'active';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === 0));
  loadLoans();
}

// Close suggest on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#bookSearch') && !e.target.closest('#bookSuggest'))
    document.getElementById('bookSuggest').classList.remove('open');
  if (!e.target.closest('#memberSearch') && !e.target.closest('#memberSuggest'))
    document.getElementById('memberSuggest').classList.remove('open');
});

async function boot() {
  const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
  if (!me || me.error || me.role !== 'librarian') { location.href = '/login'; return; }
  document.getElementById('userName').textContent   = me.name || me.email;
  document.getElementById('userAvatar').textContent = (me.name||me.email).split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  loadLoans();
}
boot();
</script>
<script src="/static/notif.js"></script>
</body>
</html>
