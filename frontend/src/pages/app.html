<div class="main" id="main">
  <div class="partial-loading"><div class="loading-spinner"></div></div>
</div>

<script>
/* ── State ────────────────────────────────────────────── */
let __partialStyles = [];
let __loadedSrcs    = new Set();

/* ── Route map ────────────────────────────────────────── */
/* Pages that serve different partials per role */
const ROLE_ROUTES = {
  '/dashboard': { teacher: 'teacher/dashboard', librarian: 'librarian/dashboard', default: 'dashboard' },
  '/':          { teacher: 'teacher/dashboard', librarian: 'librarian/dashboard', default: 'dashboard' },
  '/teacher':   { teacher: 'teacher/dashboard', default: 'dashboard' },
  '/schedule':  { teacher: 'teacher/schedule',  default: 'schedule' },
  '/conduct':   { teacher: 'teacher/conduct',   default: 'conduct' },
  '/profile':   { teacher: 'teacher/profile',   default: 'profile' },
  '/settings':  { teacher: 'teacher/settings',  default: 'settings' },
};

const ROUTES = {
  '/':                    'dashboard',
  '/dashboard':           'dashboard',
  '/calendar':            'calendar',
  '/homework':            'homework',
  '/tests':               'homework',
  '/schedule':            'schedule',
  '/grades':              'grades',
  '/leaderboard':         'leaderboard',
  '/conduct':             'conduct',
  '/activities':          'activities',
  '/whiteboard':          'whiteboard',
  '/groups':              'groups',
  '/library':             'library',
  '/messages':            'messages',
  '/meeting':             'meeting',
  '/tutor':               'tutor',
  '/profile':             'profile',
  '/settings':            'settings',
  '/classes':             'classes',
  '/assignments':         'assignments',
  '/analytics':           'analytics',
  '/books':               'books',
  '/loans':               'loans',
  '/admin':               'admin/dashboard',
  '/admin/dashboard':     'admin/dashboard',
  '/admin/users':         'admin/users',
  '/admin/school':        'admin/school',
  '/admin/settings':      'admin/settings',
  '/admin/flagged':       'admin/flagged',
  '/admin/performance':   'admin/performance',
  '/admin/nav':           'admin/nav',
  '/admin/terminal':      'admin/terminal',
};

function resolvePartialKey(path) {
  const role = window.__me?.role || 'student';
  const roleMap = ROLE_ROUTES[path];
  if (roleMap) return roleMap[role] || roleMap.default;
  return ROUTES[path] ?? null;
}

/* ── Router ───────────────────────────────────────────── */
let __navAbort = null;

async function navigate(path, push = true) {
  // Cancel any in-flight navigation
  if (__navAbort) { __navAbort.abort(); }
  __navAbort = new AbortController();
  const signal = __navAbort.signal;

  // Save meeting state and show PiP when navigating away from an active call
  if (window.currentMeeting && path !== '/meeting') {
    window.__meetingState = {
      me: window.me, meetings: window.meetings, iceServers: window.iceServers,
      socket: window.socket, localStream: window.localStream, screenStream: window.screenStream,
      peerConnections: window.peerConnections, peerNames: window.peerNames,
      currentMeeting: window.currentMeeting, callStartTime: window.callStartTime,
      durationInterval: window.durationInterval, micOn: window.micOn, camOn: window.camOn,
      screenOn: window.screenOn, _panelDragCleanup: window._panelDragCleanup,
    };
    if (window._panelDragCleanup) { window._panelDragCleanup(); window._panelDragCleanup = null; }
    window.__cleanup = null;
    showMeetingPip();
  }
  // Hide PiP when returning to meeting
  if (path === '/meeting' && document.getElementById('pip-meeting')?.style.display !== 'none') {
    hideMeetingPip();
  }

  if (typeof window.__cleanup === 'function') {
    try { window.__cleanup(); } catch(e) {}
    delete window.__cleanup;
  }
  __partialStyles.forEach(s => s.remove());
  __partialStyles = [];

  const key = resolvePartialKey(path);
  if (!key) { showError(path); return; }

  const main = document.getElementById('main');
  main.innerHTML = '<div class="partial-loading"><div class="loading-spinner"></div></div>';
  main.style.display = 'flex';
  main.style.flexDirection = 'column';

  try {
    const resp = await fetch('/partials/' + key + '.html', { signal });
    if (signal.aborted) return;
    if (!resp.ok) throw new Error(resp.status);
    const html = await resp.text();

    const tmp = document.createElement('div');
    tmp.innerHTML = html;

    // Strip .main wrapper if partial still has one
    const innerMain = tmp.querySelector('.main');
    if (innerMain) {
      [...innerMain.querySelectorAll('style, script')].forEach(el => {
        tmp.appendChild(el.cloneNode(true));
      });
      innerMain.querySelectorAll('style, script').forEach(el => el.remove());
      tmp.innerHTML = innerMain.innerHTML + tmp.innerHTML.replace(innerMain.outerHTML, '');
    }

    tmp.querySelectorAll('style').forEach(s => {
      const el = document.createElement('style');
      el.textContent = s.textContent;
      document.head.appendChild(el);
      __partialStyles.push(el);
      s.remove();
    });

    const scripts = [...tmp.querySelectorAll('script')].map(s => ({
      src: s.getAttribute('src'), text: s.textContent
    }));
    tmp.querySelectorAll('script').forEach(s => s.remove());

    main.innerHTML = tmp.innerHTML;

    for (const { src, text } of scripts) {
      if (src) {
        if (!__loadedSrcs.has(src)) {
          await new Promise((res, rej) => {
            const el = document.createElement('script');
            el.src = src; el.onload = res; el.onerror = rej;
            document.body.appendChild(el);
          });
          __loadedSrcs.add(src);
        }
      } else if (text) {
        const el = document.createElement('script');
        el.textContent = text
          .replace(/^(\s*)const\b/gm, '$1var')
          .replace(/^(\s*)let\b/gm, '$1var');
        document.body.appendChild(el);
        document.body.removeChild(el);
      }
    }

    if (push) history.pushState({ path }, '', path);
    updateActiveNav(path);
    const title = document.querySelector('.topbar-title');
    document.title = 'Armu' + (title ? ' — ' + title.textContent : '');

    // Sync theme button in the loaded partial
    const theme = document.documentElement.getAttribute('data-theme');
    document.querySelectorAll('.topbar [id="themeBtn"] use, .topbar [id="themeToggle"] use').forEach(u =>
      u.setAttribute('href', theme === 'dark' ? '#ic-sun' : '#ic-moon')
    );

    // Inject avatar into topbar-right
    const _tr = document.querySelector('#main .topbar-right');
    if (_tr && !_tr.querySelector('.topbar-avatar')) {
      const _av = document.createElement('a');
      _av.href = '/profile';
      _av.className = 'topbar-avatar';
      _av.title = window.__me ? (window.__me.name || window.__me.email || 'Profile') : 'Profile';
      _av.innerHTML = `<div class="avatar" style="width:30px;height:30px;font-size:11px;">${window.__me ? initials(window.__me.name || window.__me.email) : '?'}</div>`;
      _tr.appendChild(_av);
    }

    // Auto-switch tab for aliased routes
    if (path === '/tests' && typeof window.switchTab === 'function') window.switchTab('tests');

  } catch(e) {
    if (e?.name !== 'AbortError') showError(path);
  }
}

function showError(path) {
  document.getElementById('main').innerHTML = `
    <div class="partial-error">
      <div class="partial-error-icon">⚠</div>
      <div>Page not found: ${path}</div>
      <button onclick="navigate('/')" class="btn btn-primary" style="margin-top:16px">Go home</button>
    </div>`;
}

window.addEventListener('popstate', e => navigate(e.state?.path || location.pathname, false));

// Intercept all in-app link clicks
document.addEventListener('click', e => {
  const a = e.target.closest('a[href]');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href || !href.startsWith('/') || href === '/login') return;
  if (href.startsWith('/api') || href.startsWith('/static') || href.startsWith('/partials')) return;
  e.preventDefault();
  navigate(href);
});

/* ── Sidebar ──────────────────────────────────────────── */
function renderSidebar(sections) {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  for (const sec of sections) {
    html += `<div class="nav-section"><div class="nav-label">${sec.label}</div>`;
    for (const item of sec.items) {
      html += `<a class="nav-item" href="${item.path}" data-label="${item.label}">
        <span class="nav-icon"><svg class="icon"><use href="#${item.icon}"/></svg></span>
        <span>${item.label}</span></a>`;
    }
    html += '</div>';
  }
  nav.innerHTML = html;
}

function updateActiveNav(path) {
  document.querySelectorAll('#sidebarNav .nav-item').forEach(a =>
    a.classList.toggle('active', a.getAttribute('href') === path)
  );
}

function setSidebarWidth(collapsed) {
  document.documentElement.style.setProperty('--sidebar-w', collapsed ? '60px' : '220px');
}
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const collapsed = sidebar.classList.toggle('collapsed');
  localStorage.setItem('sidebar-collapsed', collapsed);
  setSidebarWidth(collapsed);
  document.getElementById('toggleIcon').setAttribute('href', '#ic-chevright');
}
window.toggleSidebar = toggleSidebar;

/* ── Theme (global, partials call this) ───────────────── */
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelectorAll('[id="themeBtn"] use, [id="themeToggle"] use, [id="themeIcon"]').forEach(u =>
    u.setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon')
  );
}
window.toggleTheme = toggleTheme;

/* ── Branding ─────────────────────────────────────────── */
function hexToRgbStr(hex) {
  if (!hex) return null;
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex, 16);
  if (isNaN(n)) return null;
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}

function applyBrandingData(b) {
  if (!b) return;
  const c = b.colors || {};
  const root = [], dark = [], light = [];
  if (c.g1) root.push(`--g1:${c.g1}`);
  if (c.g2) root.push(`--g2:${c.g2}`);
  if (c.g3) root.push(`--g3:${c.g3}`);
  const rgb1 = hexToRgbStr(c.g1), rgb2 = hexToRgbStr(c.g2);
  if (rgb1) root.push(`--g1-rgb:${rgb1}`);
  if (rgb2) root.push(`--g2-rgb:${rgb2}`);
  if (root.length) {
    root.push('--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3))');
    root.push('--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%)');
  }
  if (c.dark_bg)   dark.push(`--bg:${c.dark_bg}`);
  if (c.dark_bg2)  dark.push(`--bg2:${c.dark_bg2}`);
  if (c.dark_bg3)  dark.push(`--bg3:${c.dark_bg3}`);
  if (c.dark_bg4)  dark.push(`--bg4:${c.dark_bg4}`);
  if (c.light_bg)  light.push(`--bg:${c.light_bg}`);
  if (c.light_bg2) light.push(`--bg2:${c.light_bg2}`);
  if (c.light_bg3) light.push(`--bg3:${c.light_bg3}`);
  if (c.light_bg4) light.push(`--bg4:${c.light_bg4}`);

  if (c.dark_text2)  dark.push(`--text2:${c.dark_text2}`);
  if (c.dark_text3)  dark.push(`--text3:${c.dark_text3}`);
  if (c.light_text2) light.push(`--text2:${c.light_text2}`);
  if (c.light_text3) light.push(`--text3:${c.light_text3}`);

  const f = b.font || {};
  if (f.dark_text)  dark.push(`--text:${f.dark_text}`);
  if (f.light_text) light.push(`--text:${f.light_text}`);

  let css = '';
  if (root.length)  css += `:root{${root.join(';')}}`;
  if (dark.length)  css += `[data-theme="dark"]{${dark.join(';')}}`;
  if (light.length) css += `[data-theme="light"]{${light.join(';')}}`;
  if (f.family)     css += `body,input,textarea,button,select{font-family:'${f.family}',sans-serif!important;}`;
  if (f.size)       css += `body{font-size:${f.size}px;}`;
  if (f.weight)     css += `body{font-weight:${f.weight};}p,span,div,li,td,th,label{font-weight:inherit;}`;
  document.getElementById('brand-override').textContent = css;
  try { localStorage.setItem('brand-cache', JSON.stringify(b)); } catch(e) {}

  // Load Google Font if not default or system font
  const _systemFonts = new Set(['Arial','Georgia','Times New Roman','Trebuchet MS','Verdana']);
  if (f.family && !_systemFonts.has(f.family)) {
    let gfLink = document.getElementById('gfont-override');
    if (!gfLink) { gfLink = document.createElement('link'); gfLink.id = 'gfont-override'; gfLink.rel = 'stylesheet'; document.head.appendChild(gfLink); }
    gfLink.href = `https://fonts.googleapis.com/css2?family=${f.family.replace(/ /g,'+')}:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap`;
  }

  const logoText = document.getElementById('logoText');
  if (logoText && b.logo_data) {
    logoText.style.background = 'none';
    logoText.style.webkitBackgroundClip = 'unset';
    logoText.style.webkitTextFillColor = 'unset';
    logoText.style.backgroundClip = 'unset';
    logoText.innerHTML = `<img src="${b.logo_data}" style="max-height:${b.logo_height||36}px;max-width:180px;object-fit:${b.logo_fit||'contain'};display:block;" alt="logo">`;
  } else if (logoText && !b.logo_data) {
    logoText.style.cssText = '';
    logoText.innerHTML = 'armu';
  }
  const logoIcon = document.getElementById('logoIcon');
  const sidebar = document.getElementById('sidebar');
  if (logoIcon && sidebar) {
    if (b.logo_icon_data) {
      logoIcon.innerHTML = `<img src="${b.logo_icon_data}" alt="icon">`;
      sidebar.classList.add('has-icon-logo');
    } else {
      logoIcon.innerHTML = '';
      sidebar.classList.remove('has-icon-logo');
    }
  }
}
window.applyBrandingData = applyBrandingData;

const _uaSystemFonts = new Set(['Arial','Georgia','Times New Roman','Trebuchet MS','Verdana']);

function applyUserAppearance(a) {
  try { localStorage.setItem('user-appearance-cache', JSON.stringify(a || {})); } catch(e) {}
  const c = (a && a.colors) || {};
  const f = (a && a.font)   || {};
  const root = [], dark = [], light = [];
  if (c.g1) { root.push(`--g1:${c.g1}`); const r = hexToRgbStr(c.g1); if (r) root.push(`--g1-rgb:${r}`); }
  if (c.g2) { root.push(`--g2:${c.g2}`); const r = hexToRgbStr(c.g2); if (r) root.push(`--g2-rgb:${r}`); }
  if (c.g3) root.push(`--g3:${c.g3}`);
  if (root.length) {
    root.push('--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3))');
    root.push('--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%)');
  }
  if (c.dark_text2)  dark.push(`--text2:${c.dark_text2}`);
  if (c.dark_text3)  dark.push(`--text3:${c.dark_text3}`);
  if (c.light_text2) light.push(`--text2:${c.light_text2}`);
  if (c.light_text3) light.push(`--text3:${c.light_text3}`);
  let css = '';
  if (root.length)  css += `:root{${root.join(';')}}`;
  if (dark.length)  css += `[data-theme="dark"]{${dark.join(';')}}`;
  if (light.length) css += `[data-theme="light"]{${light.join(';')}}`;
  if (f.family) css += `body,input,textarea,button,select{font-family:'${f.family}',sans-serif!important;}`;
  if (f.size)   css += `body{font-size:${f.size}px;}`;
  if (f.weight) css += `body{font-weight:${f.weight};}p,span,div,li,td,th,label{font-weight:inherit;}`;
  let uEl = document.getElementById('user-appearance-override');
  if (!uEl) { uEl = document.createElement('style'); uEl.id = 'user-appearance-override'; document.head.appendChild(uEl); }
  uEl.textContent = css;
  // Load web font if needed
  if (f.family && !_uaSystemFonts.has(f.family)) {
    let gfLink = document.getElementById('gfont-user-override');
    if (!gfLink) { gfLink = document.createElement('link'); gfLink.id = 'gfont-user-override'; gfLink.rel = 'stylesheet'; document.head.appendChild(gfLink); }
    gfLink.href = `https://fonts.googleapis.com/css2?family=${f.family.replace(/ /g,'+')}:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap`;
  }
}
window.applyUserAppearance = applyUserAppearance;

async function applyBranding() {
  try {
    const b = await fetch('/api/branding').then(r => r.json()).catch(() => null);
    applyBrandingData(b);
  } catch {}
}

/* ── Boot ─────────────────────────────────────────────── */
async function boot() {
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);

  const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
  if (!me || me.error) { location.href = '/login'; return; }
  window.__me = me;
  applyBranding();
  fetch('/api/user/appearance').then(r => r.ok ? r.json() : null).then(ua => { if (ua) applyUserAppearance(ua); }).catch(() => {});

  document.getElementById('logoSub').textContent    =
    me.role === 'teacher'   ? 'teacher portal'  :
    me.role === 'admin'     ? 'admin panel'      :
    me.role === 'librarian' ? 'library portal'   : 'student portal';

  const sections = await fetch('/api/nav/config').then(r => r.json()).catch(() => null);
  if (sections) renderSidebar(sections);

  if (localStorage.getItem('sidebar-collapsed') === 'true') {
    document.getElementById('sidebar').classList.add('collapsed');
    setSidebarWidth(true);
  }

  const path = location.pathname;
  await navigate(path, false);
  history.replaceState({ path }, '', path);
}

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

/* ── PiP Meeting ──────────────────────────────────────── */
var _pipDragCleanup = null;

function showMeetingPip() {
  var pip = document.getElementById('pip-meeting');
  if (!pip) return;
  pip.style.display = 'flex';
  var pv = document.getElementById('pip-video');
  if (pv && window.localStream) { pv.srcObject = window.localStream; pv.play().catch(function(){}); }
  var pt = document.getElementById('pip-title');
  if (pt && window.currentMeeting) pt.textContent = window.currentMeeting.title;
  syncPipState();
  initPipDrag();
}

function hideMeetingPip() {
  var pip = document.getElementById('pip-meeting');
  if (pip) pip.style.display = 'none';
  if (_pipDragCleanup) { _pipDragCleanup(); _pipDragCleanup = null; }
  var pv = document.getElementById('pip-video');
  if (pv) pv.srcObject = null;
}

function syncPipState() {
  var micBtn = document.getElementById('pip-mic');
  var camBtn = document.getElementById('pip-cam');
  if (micBtn) micBtn.className = 'pip-ctrl' + (window.micOn === false ? ' off' : '');
  if (camBtn) camBtn.className = 'pip-ctrl' + (window.camOn === false ? ' off' : '');
  var nc = document.getElementById('pip-no-cam');
  var pv = document.getElementById('pip-video');
  if (nc && pv) {
    nc.style.display = window.camOn === false ? 'flex' : 'none';
    pv.style.display = window.camOn === false ? 'none' : 'block';
    nc.textContent = window.__me ? initials(window.__me.name || window.__me.email) : '?';
  }
  var info = document.getElementById('pip-info');
  if (info) info.textContent = (Object.keys(window.peerConnections || {}).length + 1) + ' in call';
}
window.showMeetingPip = showMeetingPip;
window.hideMeetingPip = hideMeetingPip;
window.syncPipState   = syncPipState;

function initPipDrag() {
  if (_pipDragCleanup) { _pipDragCleanup(); _pipDragCleanup = null; }
  var pip      = document.getElementById('pip-meeting');
  var handle   = document.getElementById('pip-header');
  var resizeEl = document.getElementById('pip-resize');
  if (!pip || !handle) return;

  var dragging = false, resizing = false, ox = 0, oy = 0, rsx = 0, rsw = 0;

  function startDrag(cx, cy) {
    dragging = true;
    var r = pip.getBoundingClientRect();
    ox = cx - r.left; oy = cy - r.top;
    pip.style.right = 'auto'; pip.style.bottom = 'auto';
  }
  function startResize(cx) {
    resizing = true; rsx = cx; rsw = pip.offsetWidth;
  }
  function onMove(cx, cy) {
    if (dragging) {
      pip.style.left = Math.max(0, Math.min(window.innerWidth  - pip.offsetWidth,  cx - ox)) + 'px';
      pip.style.top  = Math.max(0, Math.min(window.innerHeight - pip.offsetHeight, cy - oy)) + 'px';
    }
    if (resizing) {
      pip.style.width = Math.max(200, Math.min(560, rsw + cx - rsx)) + 'px';
    }
  }
  function stopAll() { dragging = false; resizing = false; }

  var onMM = function(e) { onMove(e.clientX, e.clientY); };
  var onTM = function(e) { if (e.touches[0]) onMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); };
  handle.addEventListener('mousedown',  function(e) { startDrag(e.clientX, e.clientY); e.preventDefault(); });
  handle.addEventListener('touchstart', function(e) { if (e.touches[0]) startDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
  if (resizeEl) {
    resizeEl.addEventListener('mousedown',  function(e) { startResize(e.clientX); e.preventDefault(); e.stopPropagation(); });
    resizeEl.addEventListener('touchstart', function(e) { if (e.touches[0]) startResize(e.touches[0].clientX); e.preventDefault(); e.stopPropagation(); }, {passive:false});
  }
  document.addEventListener('mousemove',  onMM);
  document.addEventListener('touchmove',  onTM, {passive:false});
  document.addEventListener('mouseup',  stopAll);
  document.addEventListener('touchend', stopAll);
  _pipDragCleanup = function() {
    document.removeEventListener('mousemove',  onMM);
    document.removeEventListener('touchmove',  onTM);
    document.removeEventListener('mouseup',  stopAll);
    document.removeEventListener('touchend', stopAll);
  };
}

boot();
</script>
