<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armu — Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--g1:#3dd68c;--g2:#38bdf8;--g3:#6ee7b7;--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);--radius:14px;--radius-sm:8px;--sidebar-w:220px;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
  [data-theme="dark"]{--bg:#111111;--bg2:#1a1a1a;--bg3:#222222;--bg4:#2c2c2c;--border:rgba(255,255,255,0.08);--border-accent:rgba(var(--g1-rgb),0.2);--text:#f0f0f0;--text2:#888888;--text3:#444444;--card:#1a1a1a;--shadow:0 4px 24px rgba(0,0,0,0.5);}
  [data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f7;--bg4:#e4e8f2;--border:rgba(0,0,0,0.07);--border-accent:rgba(var(--g1-rgb),0.3);--text:#111827;--text2:#4b5563;--text3:#9ca3af;--card:#ffffff;--shadow:0 4px 24px rgba(0,0,0,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;transition:background var(--transition),color var(--transition);}
  .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  .logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-top:2px;}
  .nav-section{padding:0 12px;margin-bottom:8px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13.5px;font-weight:400;color:var(--text2);border:1px solid transparent;margin-bottom:2px;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:linear-gradient(135deg,rgba(var(--g1-rgb),0.12),rgba(var(--g2-rgb),0.12));border-color:var(--border-accent);color:var(--text);}
  .nav-item.active .nav-icon{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}.nav-icon svg{width:16px;height:16px;}
  .sidebar-bottom{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);text-decoration:none;}
  .user-card:hover{background:var(--bg3);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-class{font-size:11px;color:var(--text3);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;flex-shrink:0;}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text2);}
  .icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border-accent);}
  .content{flex:1;overflow-y:auto;padding:28px;}
  .content::-webkit-scrollbar{width:4px;}
  .content::-webkit-scrollbar-track{background:transparent;}
  .content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
  svg.icon{color:inherit;display:inline-block;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
  .icon-14{width:14px;height:14px;}.icon-18{width:18px;height:18px;}.icon-20{width:20px;height:20px;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:slideIn 0.25s ease;}

  /* Search bar */
  .search-wrap{position:relative;margin-bottom:24px;}
  .search-input{width:100%;padding:11px 16px 11px 42px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color var(--transition);}
  .search-input:focus{border-color:var(--border-accent);}
  .search-input::placeholder{color:var(--text3);}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}

  /* Book grid */
  .books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:32px;}
  .book-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:8px;transition:all var(--transition);cursor:default;}
  .book-card:hover{border-color:var(--border-accent);transform:translateY(-2px);box-shadow:var(--shadow);}
  .book-cover{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,rgba(var(--g1-rgb),0.08),rgba(var(--g2-rgb),0.08));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text3);margin-bottom:4px;overflow:hidden;}
  .book-cover img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);}
  .book-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
  .book-author{font-size:12px;color:var(--text2);}
  .book-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .book-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
  .book-avail{font-size:11px;margin-top:auto;padding-top:8px;}

  /* Checkout row */
  .checkout-row{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;transition:background var(--transition);}
  .checkout-row:hover{background:var(--bg3);}
  .checkout-cover{width:36px;height:52px;background:linear-gradient(135deg,rgba(var(--g1-rgb),0.08),rgba(var(--g2-rgb),0.08));border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;overflow:hidden;}
  .checkout-cover img{width:100%;height:100%;object-fit:cover;}
</style>
</head>

<div class="main">
  <div class="topbar">
    <svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-library"/></svg>
    <span class="topbar-title">Library</span>
    <div class="topbar-right">
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <svg class="icon icon-18"><use href="#ic-moon"/></svg>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- Checked out books -->
    <div class="section-header" style="margin-bottom:14px;">
      <div class="section-title">Checked Out</div>
    </div>
    <div id="checked-out-list" style="margin-bottom:32px;"></div>

    <!-- Search -->

      <div class="section-title">Browse Books</div>
    </div>
    <div class="search-wrap">
      <svg class="icon icon-18 search-icon"><use href="#ic-search"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search by title or author…" autocomplete="off">
    </div>

<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if(btn) btn.querySelector('use').setAttribute('href', t === 'dark' ? '#ic-sun' : '#ic-moon');
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href', next === 'dark' ? '#ic-sun' : '#ic-moon');
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function isOverdue(iso) {
  if (!iso) return false;
  return new Date(iso) < new Date();
}

function renderCheckedOut(checkouts) {
  const el = document.getElementById('checked-out-list');
  if (!checkouts.length) {
    el.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:13px;">No books currently checked out.</div>';
    return;
  }
  el.innerHTML = checkouts.map(c => {
    const b = c.book || {};
    const overdue = isOverdue(c.due_date);
    const dueTxt = c.due_date ? 'Due ' + fmtDate(c.due_date) : '';
    const dueColor = overdue ? '#f87171' : 'var(--text3)';
    const coverHtml = b.cover_url
      ? `<img src="${b.cover_url}" alt="">`
      : `<svg class="icon icon-18"><use href="#ic-book"/></svg>`;
    return `<div class="checkout-row">
      <div class="checkout-cover">${coverHtml}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.title || '—'}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">${b.author || ''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:11px;color:${dueColor};">${overdue ? 'Overdue · ' : ''}${dueTxt}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;">Checked out ${fmtDate(c.checked_out_at)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderBooks(books) {
  const el = document.getElementById('books-grid');
  if (!books.length) {
    el.innerHTML = '<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--text3);">No books found.</div>';
    return;
  }
  el.innerHTML = books.map(b => {
    const avail = b.available_copies ?? b.total_copies ?? 0;
    const total = b.total_copies ?? 0;
    const availColor = avail > 0 ? 'var(--g1)' : '#f87171';
    const availTxt = avail > 0 ? `${avail} of ${total} available` : 'Not available';
    const coverHtml = b.cover_url
      ? `<img src="${b.cover_url}" alt="${b.title}">`
      : `<svg class="icon" style="width:36px;height:36px;"><use href="#ic-book"/></svg>`;
    const genre = b.genre ? `<span class="book-tag">${b.genre}</span>` : '';
    const pages = b.pages ? `<span class="book-tag">${b.pages} pp</span>` : '';
    return `<div class="book-card">
      <div class="book-cover">${coverHtml}</div>
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <div class="book-meta">${genre}${pages}</div>
      <div class="book-avail" style="color:${availColor};font-size:11px;font-weight:500;">${availTxt}</div>
    </div>`;
  }).join('');
}

let searchTimer = null;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = document.getElementById('searchInput').value.trim();
    fetch('/api/library/books' + (q ? '?q=' + encodeURIComponent(q) : ''))
      .then(r => r.json())
      .then(renderBooks)
      .catch(() => {});
  }, 280);
}

async function boot() {
  const [me, checkouts, books] = await Promise.all([
    fetch('/api/auth/me').then(r => r.json()).catch(() => null),
    fetch('/api/library/checked-out').then(r => r.json()).catch(() => []),
    fetch('/api/library/books').then(r => r.json()).catch(() => []),
  ]);

  if (!me || me.error) { location.href = '/login'; return; }

  document.getElementById('userName').textContent = me.name || me.email;
  document.getElementById('userAvatar').textContent =
    (me.name || me.email).split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  if (me.class_name) document.getElementById('userClass').textContent =
    me.class_name + (me.school_name ? ' · ' + me.school_name : '');

  renderCheckedOut(Array.isArray(checkouts) ? checkouts : []);
  renderBooks(Array.isArray(books) ? books : []);

  document.getElementById('searchInput').addEventListener('input', onSearch);
}

boot();
</script>
<script src="/static/notif.js"></script>
<script src="/static/pjax.js"></script>
</body>
