<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armu — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --g1: #3dd68c;
    --g2: #38bdf8;
    --g3: #6ee7b7;
    --gradient: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
    --gradient-text: linear-gradient(120deg, var(--g1) 0%, var(--g2) 60%, var(--g3) 100%);
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --bg4: #2c2c2c;
    --border: rgba(255,255,255,0.08);
    --border-accent: rgba(var(--g1-rgb),0.2);
    --text: #f0f0f0;
    --text2: #888888;
    --text3: #444444;
    --card: #1a1a1a;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
    --shadow-accent: 0 4px 24px rgba(var(--g1-rgb),0.15);
  }

  [data-theme="light"] {
    --bg: #fafaf8;
    --bg2: #ffffff;
    --bg3: #eef1f7;
    --bg4: #e4e8f2;
    --border: rgba(0,0,0,0.07);
    --border-accent: rgba(var(--g1-rgb),0.3);
    --text: #111827;
    --text2: #4b5563;
    --text3: #9ca3af;
    --card: #ffffff;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-accent: 0 4px 24px rgba(var(--g1-rgb),0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Trebuchet MS', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), color var(--transition);
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: var(--gradient-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color var(--transition);
  }

  input:focus {
    border-color: var(--border-accent);
  }

  input::placeholder {
    color: var(--text3);
  }

  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    background: var(--g1);
    border: none;
    border-radius: var(--radius-sm);
    color: #0a0a0a;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
  }

  .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); opacity: 1; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: var(--radius-sm);
    color: #f87171;
    font-size: 13px;
    text-align: center;
  }

  .error.visible { display: block; }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--text2);
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
  }

  .theme-toggle:hover { color: var(--text); border-color: var(--border-accent); }
</style>
<style id="brand-override"></style>
<script>
/* Apply cached branding before first paint */
(function(){
  try {
    var b=JSON.parse(localStorage.getItem('brand-cache')||'null');
    if(!b)return;
    var c=b.colors||{},f=b.font||{},root=[],dark=[],light=[];
    function toRgb(h){if(!h)return null;h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var n=parseInt(h,16);return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);}
    if(c.g1){root.push('--g1:'+c.g1);var r=toRgb(c.g1);if(r)root.push('--g1-rgb:'+r);}
    if(c.g2){root.push('--g2:'+c.g2);var r=toRgb(c.g2);if(r)root.push('--g2-rgb:'+r);}
    if(c.g3)root.push('--g3:'+c.g3);
    if(root.length){root.push('--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3))');root.push('--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%)');}
    if(c.dark_bg)dark.push('--bg:'+c.dark_bg);if(c.dark_bg2)dark.push('--bg2:'+c.dark_bg2);if(c.dark_bg3)dark.push('--bg3:'+c.dark_bg3);if(c.dark_bg4)dark.push('--bg4:'+c.dark_bg4);
    if(c.light_bg)light.push('--bg:'+c.light_bg);if(c.light_bg2)light.push('--bg2:'+c.light_bg2);if(c.light_bg3)light.push('--bg3:'+c.light_bg3);if(c.light_bg4)light.push('--bg4:'+c.light_bg4);
    if(f.dark_text)dark.push('--text:'+f.dark_text);if(f.light_text)light.push('--text:'+f.light_text);
    var css='';
    if(root.length)css+=':root{'+root.join(';')+'}';
    if(dark.length)css+='[data-theme="dark"]{'+dark.join(';')+'}';
    if(light.length)css+='[data-theme="light"]{'+light.join(';')+'}';
    if(f.family)css+='body,input,textarea,button,select{font-family:\''+f.family+'\',sans-serif!important;}';
    if(f.size)css+='body{font-size:'+f.size+'px;}';
    if(f.weight)css+='body{font-weight:'+f.weight+';}p,span,div,li,td,th,label{font-weight:inherit;}';
    document.getElementById('brand-override').textContent=css;
    var lSysFonts=new Set(['Arial','Georgia','Times New Roman','Trebuchet MS','Verdana']);
    if(f.family&&!lSysFonts.has(f.family)){var l=document.createElement('link');l.rel='stylesheet';l.href='https://fonts.googleapis.com/css2?family='+f.family.replace(/ /g,'+')+'&display=swap';document.head.appendChild(l);}
  }catch(e){}
})();
</script>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Light</button>

<div class="login-card">
  <div class="logo">
    <div class="logo-text" id="loginLogo">Armu</div>
    <div class="logo-sub" id="loginSub">student &amp; staff portal</div>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@school.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>

<script>
  // Apply theme from localStorage
  (function(){
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.dataset.theme = t;
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = t === 'dark' ? 'Light' : 'Dark';
  })();

  function applyLoginBranding(b) {
    if (!b) return;
    try { localStorage.setItem('brand-cache', JSON.stringify(b)); } catch(e) {}
    // Re-apply CSS (covers first-visit with no cache)
    const c = b.colors||{}, f = b.font||{}, root=[], dark=[], light=[];
    function toRgb(h){if(!h)return null;h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];const n=parseInt(h,16);return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);}
    if(c.g1){root.push('--g1:'+c.g1);const r=toRgb(c.g1);if(r)root.push('--g1-rgb:'+r);}
    if(c.g2){root.push('--g2:'+c.g2);const r=toRgb(c.g2);if(r)root.push('--g2-rgb:'+r);}
    if(c.g3)root.push('--g3:'+c.g3);
    if(root.length){root.push('--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3))');root.push('--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%)');}
    if(c.dark_bg)dark.push('--bg:'+c.dark_bg);if(c.dark_bg2)dark.push('--bg2:'+c.dark_bg2);if(c.dark_bg3)dark.push('--bg3:'+c.dark_bg3);if(c.dark_bg4)dark.push('--bg4:'+c.dark_bg4);
    if(c.light_bg)light.push('--bg:'+c.light_bg);if(c.light_bg2)light.push('--bg2:'+c.light_bg2);if(c.light_bg3)light.push('--bg3:'+c.light_bg3);if(c.light_bg4)light.push('--bg4:'+c.light_bg4);
    if(f.dark_text)dark.push('--text:'+f.dark_text);if(f.light_text)light.push('--text:'+f.light_text);
    let css='';
    if(root.length)css+=`:root{${root.join(';')}}`;
    if(dark.length)css+=`[data-theme="dark"]{${dark.join(';')}}`;
    if(light.length)css+=`[data-theme="light"]{${light.join(';')}}`;
    if(f.family)css+=`body,input,textarea,button,select{font-family:'${f.family}',sans-serif!important;}`;
    if(f.size)css+=`body{font-size:${f.size}px;}`;
    if(f.weight)css+=`body{font-weight:${f.weight};}p,span,div,li,td,th,label{font-weight:inherit;}`;
    document.getElementById('brand-override').textContent = css;
    const _lgnSysFonts=new Set(['Arial','Georgia','Times New Roman','Trebuchet MS','Verdana']);
    if(f.family && !_lgnSysFonts.has(f.family)){
      let l=document.getElementById('gfont-login');
      if(!l){l=document.createElement('link');l.id='gfont-login';l.rel='stylesheet';document.head.appendChild(l);}
      l.href=`https://fonts.googleapis.com/css2?family=${f.family.replace(/ /g,'+')}:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap`;
    }
    // Logo
    const logoEl = document.getElementById('loginLogo');
    const subEl  = document.getElementById('loginSub');
    if (logoEl) {
      if (b.logo_data) {
        logoEl.style.cssText = 'background:none;-webkit-text-fill-color:unset;';
        logoEl.innerHTML = `<img src="${b.logo_data}" style="max-height:${b.logo_height||48}px;max-width:240px;object-fit:${b.logo_fit||'contain'};" alt="logo">`;
      } else {
        logoEl.style.cssText = '';
        logoEl.textContent = 'Armu';
      }
    }
    if (subEl && b.school_name) subEl.textContent = b.school_name;
  }

  // Fetch fresh branding (public endpoint, no auth needed)
  fetch('/api/branding').then(r=>r.ok?r.json():null).then(b=>{ if(b) applyLoginBranding(b); }).catch(()=>{});

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isDark ? 'Dark' : 'Light';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errorEl = document.getElementById('errorMsg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errorEl.classList.remove('visible');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include',
      });

      if (res.ok) {
        const user = await res.json();
        // Redirect based on role
        const destinations = {
          student: '/dashboard',
          teacher: '/teacher',
          admin: '/admin',
          librarian: '/library',
          parent: '/parent',
        };
        window.location.href = destinations[user.role] || '/dashboard';
      } else {
        const data = await res.json().catch(() => ({}));
        showError(data.error || 'Login failed. Please try again.');
      }
    } catch {
      showError('Could not reach the server. Is the backend running?');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
