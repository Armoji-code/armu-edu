<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MokyAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --g1: #3dd68c;
    --g2: #38bdf8;
    --g3: #6ee7b7;
    --gradient: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
    --gradient-text: linear-gradient(120deg, var(--g1) 0%, var(--g2) 60%, var(--g3) 100%);
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --bg4: #2c2c2c;
    --border: rgba(255,255,255,0.08);
    --border-accent: rgba(61,214,140,0.2);
    --text: #f0f0f0;
    --text2: #888888;
    --text3: #444444;
    --card: #1a1a1a;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
    --shadow-accent: 0 4px 24px rgba(61,214,140,0.15);
  }

  [data-theme="light"] {
    --bg: #f5f7fa;
    --bg2: #ffffff;
    --bg3: #eef1f7;
    --bg4: #e4e8f2;
    --border: rgba(0,0,0,0.07);
    --border-accent: rgba(61,214,140,0.3);
    --text: #111827;
    --text2: #4b5563;
    --text3: #9ca3af;
    --card: #ffffff;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-accent: 0 4px 24px rgba(61,214,140,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), color var(--transition);
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: var(--gradient-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color var(--transition);
  }

  input:focus {
    border-color: var(--border-accent);
  }

  input::placeholder {
    color: var(--text3);
  }

  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    background: var(--gradient);
    border: none;
    border-radius: var(--radius-sm);
    color: #111;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
  }

  .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); opacity: 1; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: var(--radius-sm);
    color: #f87171;
    font-size: 13px;
    text-align: center;
  }

  .error.visible { display: block; }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
  }

  .theme-toggle:hover { color: var(--text); border-color: var(--border-accent); }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Light</button>

<div class="login-card">
  <div class="logo">
    <div class="logo-text">MokyAI</div>
    <div class="logo-sub">School Platform</div>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@school.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>

<script>
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    document.getElementById('themeBtn').textContent = isDark ? 'Dark' : 'Light';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errorEl = document.getElementById('errorMsg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errorEl.classList.remove('visible');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include',
      });

      if (res.ok) {
        const user = await res.json();
        // Redirect based on role
        const destinations = {
          student: '/dashboard',
          teacher: '/teacher',
          admin: '/admin',
          librarian: '/library',
          parent: '/parent',
        };
        window.location.href = destinations[user.role] || '/dashboard';
      } else {
        const data = await res.json().catch(() => ({}));
        showError(data.error || 'Login failed. Please try again.');
      }
    } catch {
      showError('Could not reach the server. Is the backend running?');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
