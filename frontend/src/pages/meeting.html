<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armu — Meeting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root{--g1:#3dd68c;--g2:#38bdf8;--g3:#6ee7b7;--gradient:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));--gradient-text:linear-gradient(120deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);--radius:14px;--radius-sm:8px;--sidebar-w:220px;--transition:0.2s cubic-bezier(0.4,0,0.2,1);}
  [data-theme="dark"]{--bg:#111111;--bg2:#1a1a1a;--bg3:#222222;--bg4:#2c2c2c;--border:rgba(255,255,255,0.08);--border-accent:rgba(61,214,140,0.2);--text:#f0f0f0;--text2:#888888;--text3:#444444;--card:#1a1a1a;--shadow:0 4px 24px rgba(0,0,0,0.5);}
  [data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f7;--bg4:#e4e8f2;--border:rgba(0,0,0,0.07);--border-accent:rgba(61,214,140,0.3);--text:#111827;--text2:#4b5563;--text3:#9ca3af;--card:#ffffff;--shadow:0 4px 24px rgba(0,0,0,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  #sidebarNav{display:contents;}
  .logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo-text{font-size:22px;font-weight:600;letter-spacing:-0.5px;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-top:2px;}
  .nav-section{padding:0 12px;margin-bottom:8px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13.5px;font-weight:400;color:var(--text2);border:1px solid transparent;margin-bottom:2px;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:linear-gradient(135deg,rgba(61,214,140,0.12),rgba(56,189,248,0.12));border-color:var(--border-accent);color:var(--text);}
  .nav-item.active .nav-icon{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .nav-badge{background:var(--g1);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:auto;}
  .sidebar-bottom{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);text-decoration:none;}
  .user-card:hover{background:var(--bg3);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-class{font-size:11px;color:var(--text3);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;flex-shrink:0;}
  .topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text2);}
  .icon-btn:hover{background:var(--bg4);color:var(--text);}
  .content{flex:1;overflow-y:auto;padding:28px;}
  svg.icon{color:inherit;display:inline-block;width:1em;height:1em;vertical-align:middle;flex-shrink:0;}
  .icon-14{width:14px;height:14px;}.icon-18{width:18px;height:18px;}.icon-20{width:20px;height:20px;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:slideIn 0.25s ease;}

  /* ── Lobby ─────────────────────────────────────────────────────────── */
  .lobby-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .lobby-title{font-size:20px;font-weight:600;letter-spacing:-0.4px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;cursor:pointer;border:none;transition:all var(--transition);font-family:inherit;}
  .btn-primary{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;}
  .btn-primary:hover{opacity:0.9;}
  .btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
  .btn-ghost:hover{color:var(--text);border-color:var(--border-accent);}
  .meeting-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .meeting-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color var(--transition);}
  .meeting-card:hover{border-color:var(--border-accent);}
  .meeting-card-title{font-size:15px;font-weight:600;margin-bottom:4px;}
  .meeting-card-meta{font-size:12px;color:var(--text3);margin-bottom:14px;display:flex;gap:12px;}
  .meeting-card-dot{width:8px;height:8px;border-radius:50%;background:var(--g1);display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .meeting-card-actions{display:flex;gap:8px;}
  .empty-state{text-align:center;padding:60px 0;color:var(--text3);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px;}

  /* ── Modal: start meeting ───────────────────────────────────────────── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--transition);}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:400px;}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px;}
  .field-row{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;}
  .field-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13.5px;color:var(--text);font-family:inherit;outline:none;transition:border-color var(--transition);}
  .field-input:focus{border-color:var(--border-accent);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}

  /* ── In-call overlay ────────────────────────────────────────────────── */
  .call-overlay{position:fixed;inset:0;background:#0a0a0a;z-index:200;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .call-overlay.active{opacity:1;pointer-events:all;}
  .call-topbar{display:flex;align-items:center;padding:14px 20px;gap:14px;flex-shrink:0;background:rgba(0,0,0,0.4);}
  .call-title{font-size:15px;font-weight:600;color:#fff;}
  .call-duration{font-size:12px;color:rgba(255,255,255,0.5);margin-left:4px;}
  .call-spacer{flex:1;}
  .call-body{flex:1;display:flex;overflow:hidden;}
  .video-grid{flex:1;display:grid;gap:6px;padding:10px;align-items:center;justify-items:center;}
  .video-tile{position:relative;background:#1a1a1a;border-radius:10px;overflow:hidden;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .video-tile video{width:100%;height:100%;object-fit:cover;}
  .video-tile.local{border:2px solid rgba(61,214,140,0.4);}
  .tile-label{position:absolute;bottom:8px;left:10px;font-size:12px;font-weight:500;color:#fff;background:rgba(0,0,0,0.55);padding:2px 8px;border-radius:6px;}
  .tile-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#3dd68c,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;}
  .tile-muted{position:absolute;top:8px;right:8px;background:rgba(239,68,68,0.85);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
  .call-sidebar{width:220px;background:rgba(0,0,0,0.3);border-left:1px solid rgba(255,255,255,0.06);padding:16px;overflow-y:auto;flex-shrink:0;}
  .call-sidebar-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
  .participant-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .participant-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3dd68c,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
  .participant-name{font-size:13px;color:rgba(255,255,255,0.8);}
  .call-controls{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 20px;background:rgba(0,0,0,0.4);flex-shrink:0;}
  .ctrl-btn{width:48px;height:48px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);font-size:20px;}
  .ctrl-btn.on{background:rgba(255,255,255,0.12);color:#fff;}
  .ctrl-btn.on:hover{background:rgba(255,255,255,0.2);}
  .ctrl-btn.off{background:rgba(239,68,68,0.85);color:#fff;}
  .ctrl-btn.off:hover{background:rgba(239,68,68,1);}
  .ctrl-btn.leave{background:rgba(239,68,68,0.9);color:#fff;width:52px;height:52px;border-radius:50%;}
  .ctrl-btn.leave:hover{background:#ef4444;}
  .ctrl-label{font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px;text-align:center;}
  .ctrl-wrap{display:flex;flex-direction:column;align-items:center;}
  .call-sidebar-toggle{display:none;}
</style>
</head>

      <div class="avatar" id="userAvatar">?</div>

      <svg class="icon icon-14" style="color:var(--text3);margin-left:auto;flex-shrink:0"><use href="#ic-chevright"/></svg>
    </a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <svg class="icon icon-20" style="color:var(--g1)"><use href="#ic-meeting"/></svg>
    <span class="topbar-title">Meeting</span>
    <div class="topbar-right">
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()"><svg class="icon icon-18"><use href="#ic-moon"/></svg></div>
    </div>
  </div>
  <div class="content" id="mainContent">
    <div style="padding:48px;text-align:center;color:var(--text3);">Loading…</div>
  </div>
</div>

<!-- Start Meeting Modal -->
<div class="modal-overlay" id="newMeetingModal">
  <div class="modal">
    <div class="modal-title">Start a Meeting</div>
    <div class="field-row">
      <div class="field-label">Title</div>
      <input class="field-input" id="newMeetingTitle" type="text" placeholder="e.g. Math Study Session">
    </div>
    <div class="field-row" id="classFieldRow">
      <div class="field-label">Class <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></div>
      <select class="field-input" id="newMeetingClass">
        <option value="">No class — share the link manually</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewMeeting()">Start</button>
    </div>
  </div>
</div>

<!-- In-call overlay -->
<div class="call-overlay" id="callOverlay">
  <div class="call-topbar">
    <svg class="icon icon-18" style="color:var(--g1)"><use href="#ic-meeting"/></svg>
    <span class="call-title" id="callTitle">Meeting</span>
    <span class="call-duration" id="callDuration"></span>
    <div class="call-spacer"></div>
  </div>
  <div class="call-body">
    <div class="video-grid" id="videoGrid"></div>
    <div class="call-sidebar" id="callSidebar">
      <div class="call-sidebar-title">Participants</div>
      <div id="participantList"></div>
    </div>
  </div>
  <div class="call-controls">
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="btnMic" onclick="toggleMic()">🎤</button>
      <div class="ctrl-label">Mic</div>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="btnCam" onclick="toggleCam()">📷</button>
      <div class="ctrl-label">Camera</div>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="btnScreen" onclick="toggleScreen()">🖥</button>
      <div class="ctrl-label">Share</div>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn leave" onclick="leaveMeeting()">📵</button>
      <div class="ctrl-label" style="color:#ef4444">Leave</div>
    </div>
  </div>
</div>

<script src="/static/notif.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn')?.querySelector('use').setAttribute('href', t==='dark'?'#ic-sun':'#ic-moon');
})();
function toggleTheme(){
  const n = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('theme',n);
  document.getElementById('themeBtn').querySelector('use').setAttribute('href',n==='dark'?'#ic-sun':'#ic-moon');
}

// ── State ─────────────────────────────────────────────────────────────────────
let me = null;
let meetings = [];
let iceServers = [];
let socket = null;
let localStream = null;
let screenStream = null;
let peerConnections = {};   // peer_id -> RTCPeerConnection
let peerNames = {};          // peer_id -> name
let currentMeeting = null;
let callStartTime = null;
let durationInterval = null;
let micOn = true, camOn = true, screenOn = false;

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  me = await fetch('/api/auth/me').then(r=>r.json()).catch(()=>null);
  if (!me || me.error) { location.href='/login'; return; }
  document.getElementById('userName').textContent = me.name || me.email;
  document.getElementById('userAvatar').textContent = initials(me.name||me.email);
  document.getElementById('userClass').textContent = me.class_name
    ? me.class_name + (me.school_name ? ' · '+me.school_name : '')
    : (me.role ? me.role[0].toUpperCase()+me.role.slice(1) : '');

  // Teacher sidebar swap
  if (me.role === 'teacher') {
    document.getElementById('logoSub').textContent = 'teacher portal';
    document.getElementById('sidebarNav').innerHTML = `
      <div class="nav-section">
        <div class="nav-label">Manage</div>
        <a class="nav-item" href="/teacher"><span class="nav-icon"><svg class="icon"><use href="#ic-dashboard"/></svg></span><span>Overview</span></a>
        <a class="nav-item" href="/teacher/classes"><span class="nav-icon"><svg class="icon"><use href="#ic-groups"/></svg></span><span>Classes</span></a>
        <a class="nav-item" href="/teacher/assignments"><span class="nav-icon"><svg class="icon"><use href="#ic-homework"/></svg></span><span>Assignments</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Tools</div>
        <a class="nav-item active" href="/meeting"><span class="nav-icon"><svg class="icon"><use href="#ic-meeting"/></svg></span><span>Meeting</span></a>
        <a class="nav-item" href="/messages"><span class="nav-icon"><svg class="icon"><use href="#ic-messages"/></svg></span><span>Messages</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Other</div>
        <a class="nav-item" href="/settings"><span class="nav-icon"><svg class="icon"><use href="#ic-settings"/></svg></span><span>Settings</span></a>
      </div>`;
  }

  // Fetch ICE config + meetings
  const [iceResp, mtgResp] = await Promise.all([
    fetch('/api/meetings/ice-config').then(r=>r.json()).catch(()=>({ice_servers:[]})),
    fetch('/api/meetings').then(r=>r.json()).catch(()=>[]),
  ]);
  iceServers = iceResp.ice_servers || [];
  meetings   = mtgResp;

  renderLobby();
  initSocket();
  setInterval(refreshMeetings, 8000);
}

function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

// ── Socket ────────────────────────────────────────────────────────────────────
function initSocket() {
  socket = io();
  socket.emit('user_join', {user_id: me.id});

  socket.on('meeting:peers', ({peers}) => {
    peers.forEach(p => {
      peerNames[p.id] = p.name;
      createOffer(p.id);
    });
    renderParticipants();
  });

  socket.on('meeting:peer-joined', ({id, name}) => {
    peerNames[id] = name;
    ensurePeerConnection(id, false);
    renderParticipants();
  });

  socket.on('meeting:peer-left', ({id}) => {
    closePeer(id);
    renderParticipants();
  });

  socket.on('meeting:signal', async ({from, data}) => {
    if (data.type === 'offer') {
      await handleOffer(from, data);
    } else if (data.type === 'answer') {
      const pc = peerConnections[from];
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data));
    } else if (data.candidate) {
      const pc = peerConnections[from];
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(data)).catch(()=>{});
    }
  });
}

// ── WebRTC ────────────────────────────────────────────────────────────────────
function ensurePeerConnection(peerId, isInitiator) {
  if (peerConnections[peerId]) return peerConnections[peerId];
  const pc = new RTCPeerConnection({iceServers});
  peerConnections[peerId] = pc;

  // Add local tracks
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  // Handle remote stream
  const remoteStream = new MediaStream();
  pc.ontrack = e => {
    remoteStream.addTrack(e.track);
    updateRemoteVideo(peerId, remoteStream);
  };

  // ICE candidates
  pc.onicecandidate = e => {
    if (e.candidate) signal(peerId, e.candidate.toJSON());
  };

  pc.onconnectionstatechange = () => {
    if (['failed','disconnected','closed'].includes(pc.connectionState)) {
      closePeer(peerId);
      renderParticipants();
    }
  };

  addRemoteTile(peerId);
  return pc;
}

async function createOffer(peerId) {
  const pc = ensurePeerConnection(peerId, true);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  signal(peerId, {type: offer.type, sdp: offer.sdp});
}

async function handleOffer(peerId, offerData) {
  peerNames[peerId] = peerNames[peerId] || 'Peer';
  const pc = ensurePeerConnection(peerId, false);
  await pc.setRemoteDescription(new RTCSessionDescription(offerData));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  signal(peerId, {type: answer.type, sdp: answer.sdp});
}

function signal(toId, data) {
  socket.emit('meeting:signal', {to: toId, room_code: currentMeeting.room_code, data});
}

function closePeer(peerId) {
  const pc = peerConnections[peerId];
  if (pc) { pc.close(); delete peerConnections[peerId]; }
  delete peerNames[peerId];
  const tile = document.getElementById(`tile-${peerId}`);
  if (tile) tile.remove();
  updateGridLayout();
}

// ── Video tiles ───────────────────────────────────────────────────────────────
function addLocalTile() {
  const grid = document.getElementById('videoGrid');
  const tile = document.createElement('div');
  tile.className = 'video-tile local';
  tile.id = 'tile-local';
  const video = document.createElement('video');
  video.autoplay = true; video.muted = true; video.playsInline = true;
  video.srcObject = localStream;
  tile.appendChild(video);
  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = (me.name || 'You') + ' (You)';
  tile.appendChild(label);
  grid.appendChild(tile);
  updateGridLayout();
}

function addRemoteTile(peerId) {
  if (document.getElementById(`tile-${peerId}`)) return;
  const grid = document.getElementById('videoGrid');
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = `tile-${peerId}`;
  const avatar = document.createElement('div');
  avatar.className = 'tile-avatar';
  avatar.textContent = initials(peerNames[peerId] || '?');
  tile.appendChild(avatar);
  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = peerNames[peerId] || 'Connecting…';
  tile.appendChild(label);
  grid.appendChild(tile);
  updateGridLayout();
}

function updateRemoteVideo(peerId, stream) {
  const tile = document.getElementById(`tile-${peerId}`);
  if (!tile) return;
  let video = tile.querySelector('video');
  if (!video) {
    video = document.createElement('video');
    video.autoplay = true; video.playsInline = true;
    tile.insertBefore(video, tile.firstChild);
    tile.querySelector('.tile-avatar')?.remove();
  }
  video.srcObject = stream;
}

function updateGridLayout() {
  const grid = document.getElementById('videoGrid');
  const n = grid.children.length;
  if (n <= 1)      { grid.style.gridTemplateColumns = '1fr'; grid.style.gridTemplateRows = '1fr'; }
  else if (n <= 2) { grid.style.gridTemplateColumns = '1fr 1fr'; grid.style.gridTemplateRows = '1fr'; }
  else if (n <= 4) { grid.style.gridTemplateColumns = '1fr 1fr'; grid.style.gridTemplateRows = '1fr 1fr'; }
  else if (n <= 6) { grid.style.gridTemplateColumns = '1fr 1fr 1fr'; grid.style.gridTemplateRows = '1fr 1fr'; }
  else             { grid.style.gridTemplateColumns = 'repeat(3,1fr)'; grid.style.gridTemplateRows = 'auto'; }
}

function renderParticipants() {
  const list = document.getElementById('participantList');
  const all = [{id: 'local', name: (me.name||'You') + ' (You)'}];
  Object.entries(peerNames).forEach(([id, name]) => all.push({id, name}));
  list.innerHTML = all.map(p => `
    <div class="participant-item">
      <div class="participant-avatar">${initials(p.name)}</div>
      <div class="participant-name">${p.name}</div>
    </div>`).join('');
}

// ── Join / Leave ──────────────────────────────────────────────────────────────
async function joinMeeting(meeting) {
  currentMeeting = meeting;
  document.getElementById('callTitle').textContent = meeting.title;
  document.getElementById('videoGrid').innerHTML = '';
  peerConnections = {}; peerNames = {};

  try {
    localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
  } catch (e) {
    alert('Could not access camera/microphone: ' + e.message);
    return;
  }

  document.getElementById('callOverlay').classList.add('active');
  addLocalTile();
  renderParticipants();

  callStartTime = Date.now();
  durationInterval = setInterval(() => {
    const s = Math.floor((Date.now()-callStartTime)/1000);
    const m = Math.floor(s/60), sec = s%60;
    document.getElementById('callDuration').textContent = `${m}:${String(sec).padStart(2,'0')}`;
  }, 1000);

  socket.emit('meeting:join', {room_code: meeting.room_code});
}

async function leaveMeeting() {
  if (currentMeeting) {
    socket.emit('meeting:leave', {room_code: currentMeeting.room_code});
  }
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections = {}; peerNames = {};
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  clearInterval(durationInterval);
  document.getElementById('callOverlay').classList.remove('active');
  document.getElementById('videoGrid').innerHTML = '';
  currentMeeting = null; micOn = true; camOn = true; screenOn = false;
  document.getElementById('btnMic').className = 'ctrl-btn on';
  document.getElementById('btnCam').className = 'ctrl-btn on';
  document.getElementById('btnScreen').className = 'ctrl-btn on';
  refreshMeetings();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  localStream?.getAudioTracks().forEach(t => t.enabled = micOn);
  document.getElementById('btnMic').className = `ctrl-btn ${micOn?'on':'off'}`;
}

function toggleCam() {
  camOn = !camOn;
  localStream?.getVideoTracks().forEach(t => t.enabled = camOn);
  const video = document.querySelector('#tile-local video');
  if (video) video.style.display = camOn ? '' : 'none';
  document.getElementById('btnCam').className = `ctrl-btn ${camOn?'on':'off'}`;
}

async function toggleScreen() {
  if (!screenOn) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
      const screenTrack = screenStream.getVideoTracks()[0];
      Object.values(peerConnections).forEach(pc => {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(screenTrack);
      });
      const localVideo = document.querySelector('#tile-local video');
      if (localVideo) localVideo.srcObject = screenStream;
      screenTrack.onended = () => { screenOn = true; toggleScreen(); };
      screenOn = true;
      document.getElementById('btnScreen').className = 'ctrl-btn off';
    } catch (e) { return; }
  } else {
    const camTrack = localStream?.getVideoTracks()[0];
    if (camTrack) {
      Object.values(peerConnections).forEach(pc => {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(camTrack);
      });
    }
    screenStream?.getTracks().forEach(t => t.stop()); screenStream = null;
    const localVideo = document.querySelector('#tile-local video');
    if (localVideo) localVideo.srcObject = localStream;
    screenOn = false;
    document.getElementById('btnScreen').className = 'ctrl-btn on';
  }
}

// ── Lobby render ──────────────────────────────────────────────────────────────
function renderLobby() {
  const c = document.getElementById('mainContent');
  const canEnd = mid => {
    const m = meetings.find(x=>x.id===mid);
    return m && (m.host_id===me.id || me.role==='admin' || me.role==='teacher');
  };

  c.innerHTML = `
    <div class="lobby-header">
      <div class="lobby-title">Active Meetings</div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg class="icon icon-14"><use href="#ic-plus"/></svg> Start Meeting
      </button>
    </div>
    <div class="meeting-grid" id="meetingGrid"></div>`;

  const grid = document.getElementById('meetingGrid');
  if (!meetings.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📹</div>
      <div class="empty-title">No active meetings</div>
      <div style="font-size:13px;margin-top:4px">Start one and share the link with your class.</div>
    </div>`;
    return;
  }

  meetings.forEach(m => {
    const card = document.createElement('div');
    card.className = 'meeting-card';
    card.innerHTML = `
      <div class="meeting-card-title">
        <span class="meeting-card-dot"></span>${m.title}
      </div>
      <div class="meeting-card-meta">
        <span>Host: ${m.host_name}</span>
        <span>${m.participant_count} online</span>
      </div>
      <div class="meeting-card-actions">
        <button class="btn btn-primary" onclick="joinMeeting(${JSON.stringify(m).replace(/"/g,'&quot;')})">Join</button>
        ${canEnd(m.id) ? `<button class="btn btn-ghost" onclick="endMeeting(${m.id})">End</button>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

async function refreshMeetings() {
  meetings = await fetch('/api/meetings').then(r=>r.json()).catch(()=>[]);
  if (!document.getElementById('callOverlay').classList.contains('active')) renderLobby();
}

// ── Start meeting modal ───────────────────────────────────────────────────────
async function openModal() {
  // Populate class dropdown for teachers/admins
  const sel = document.getElementById('newMeetingClass');
  if (me.role === 'teacher' || me.role === 'admin') {
    const classes = await fetch('/api/teacher/classes').then(r=>r.ok?r.json():[]).catch(()=>[]);
    classes.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } else {
    document.getElementById('classFieldRow').style.display = 'none';
  }
  document.getElementById('newMeetingModal').classList.add('open');
  document.getElementById('newMeetingTitle').focus();
}

function closeModal() {
  document.getElementById('newMeetingModal').classList.remove('open');
}

async function confirmNewMeeting() {
  const title    = document.getElementById('newMeetingTitle').value.trim() || 'Meeting';
  const class_id = document.getElementById('newMeetingClass').value || null;
  const m = await fetch('/api/meetings', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({title, class_id: class_id ? parseInt(class_id) : null}),
  }).then(r=>r.json()).catch(()=>null);
  closeModal();
  if (m && m.id) {
    await refreshMeetings();
    joinMeeting(m);
  }
}

async function endMeeting(id) {
  await fetch(`/api/meetings/${id}`, {method:'DELETE'});
  refreshMeetings();
}

// Close modal on overlay click
document.getElementById('newMeetingModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Keyboard shortcuts in call
document.addEventListener('keydown', e => {
  if (!currentMeeting) return;
  if (e.key === 'm') toggleMic();
  if (e.key === 'c') toggleCam();
  if (e.key === 'Escape') leaveMeeting();
});

boot();
</script>
</body>
</html>
